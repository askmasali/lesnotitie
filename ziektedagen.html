<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziektedagen — Mustafa</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2ede8;--surface:#fff;--surface2:#faf7f4;--border:#e3d9d0;
  --text:#231810;--text2:#7a5c4a;--text3:#b09480;
  --green:#1e6b45;--green2:#d4eddf;--amber:#b86a1a;--amber2:#fdecd6;
  --red:#b83232;--red2:#fde0e0;--blue:#1a4fb8;--blue2:#dce8fd;
  --shadow:0 2px 12px rgba(35,24,16,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app-header{background:var(--text);color:#fff;padding:28px 36px 24px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px}
.app-header h1{font-family:'Fraunces',serif;font-size:36px;font-weight:300;font-style:italic;letter-spacing:-1px;line-height:1}
.app-header .sub{font-size:11px;opacity:.4;letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}
.login-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:8px 18px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.login-btn:hover{background:rgba(255,255,255,.22)}
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.7}
.balance-strip{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap}
.bal-cell{padding:16px 28px;border-right:1px solid var(--border);flex:1;min-width:110px}
.bal-cell:last-child{border-right:none}
.bal-num{font-family:'Fraunces',serif;font-size:36px;font-weight:600;line-height:1;letter-spacing:-1px;margin-bottom:2px}
.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}
.bal-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:500}
.progress-section{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 36px}
.prog-bar-bg{height:7px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:6px}
.prog-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--amber));transition:width .6s}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.layout{max-width:1080px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 330px;gap:20px;align-items:start}
@media(max-width:760px){.layout{grid-template-columns:1fr}.bal-cell{padding:12px 16px}.app-header h1{font-size:26px}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.card+.card{margin-top:18px}
.card-head{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Fraunces',serif;font-size:18px;font-weight:300;font-style:italic}
.card-badge{font-size:11px;color:var(--text3)}
.card-body{padding:18px 20px}
.yr-block{margin-bottom:14px}
.yr-block:last-child{margin-bottom:0}
.yr-head{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--surface2);border-radius:9px;margin-bottom:5px;cursor:pointer;user-select:none;transition:background .15s}
.yr-head:hover{background:var(--border)}
.yr-head-lbl{font-weight:600;font-size:12px;color:var(--text2)}
.yr-arrow{color:var(--text3);font-size:10px;transition:transform .2s;display:inline-block;margin-left:6px}
.yr-arrow.open{transform:rotate(90deg)}
.yr-entries{display:none}
.yr-entries.open{display:block}
.entry-row{display:grid;grid-template-columns:1fr auto 24px;align-items:center;gap:8px;padding:6px 11px;border-radius:7px;margin-bottom:2px;font-size:13px;transition:background .1s}
.entry-row:hover{background:var(--surface2)}
.entry-date{color:var(--text2);font-weight:500}
.pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}
.pill-amber{background:var(--amber2);color:var(--amber)}
.pill-green{background:var(--green2);color:var(--green)}
.pill-red{background:var(--red2);color:var(--red)}
.pill-muted{background:var(--border);color:var(--text3)}
.entry-note{font-size:10px;color:var(--text3);grid-column:1/-1;padding:0 2px 3px;font-style:italic}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 4px;border-radius:4px;transition:color .1s;line-height:1}
.del-btn:hover{color:var(--red)}
.form-grid{display:flex;flex-direction:column;gap:12px}
.form-row{display:flex;gap:9px}
.fg{display:flex;flex-direction:column;gap:4px;flex:1}
.fg label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.9px}
.fg input,.fg textarea{border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;width:100%}
.fg input:focus,.fg textarea:focus{border-color:var(--amber)}
.fg textarea{resize:vertical;min-height:60px}
.btn{border:none;border-radius:9px;padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.btn-dark{background:var(--text);color:#fff}
.btn-dark:hover{background:#3d2510}
.mini-table{width:100%;border-collapse:collapse;font-size:12px}
.mini-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;padding:5px 9px;text-align:left;border-bottom:1px solid var(--border)}
.mini-table td{padding:6px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
.mini-table tr:last-child td{border-bottom:none}
.mini-table .r{text-align:right;font-weight:700}
.sync-bar{background:var(--blue2);border-bottom:1px solid #b8d0f8;padding:7px 36px;font-size:11px;color:#1a3d80;display:none;align-items:center;gap:8px}
.sync-bar.show{display:flex}
.dot{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:500;display:none;z-index:9999;white-space:nowrap}
</style>
</head>

<header class="app-header">
  <div>
    <h1>Ziektedagen</h1>

<div class="layout">

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyD0SO2m658hN3O8p9GJodODn6kRPuu5iFQ",
  authDomain:"lesnotitie.firebaseapp.com",
  projectId:"lesnotitie",
  storageBucket:"lesnotitie.firebasestorage.app",
  messagingSenderId:"295926362823",
  appId:"1:295926362823:web:4704194a0d80544ad7c4e2"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

window._signIn=async()=>{
  try{await signInWithPopup(auth,provider);}catch(e){console.error(e);}
};
window._signOut=async()=>{
  await signOut(auth);
  window._currentUser=null;
  document.getElementById('auth-area').innerHTML='<button class="login-btn" onclick="signIn()">🔐 Inloggen met Google</button>';
  window._toast('👋 Uitgelogd');
};

window._saveToFirebase=async(entries)=>{
  if(!window._currentUser)return;
  showSync('Opslaan…');
  try{
    await setDoc(doc(db,'ziektedagen',window._currentUser.uid),{
      entries:JSON.stringify(entries),
      updatedAt:new Date().toISOString()
    });
    hideSync();
  }catch(e){console.error(e);hideSync();}
};

window._loadFromFirebase=async(uid)=>{
  showSync('Laden…');
  try{
    const snap=await getDoc(doc(db,'ziektedagen',uid));
    if(snap.exists()&&snap.data().entries){
      const entries=JSON.parse(snap.data().entries);
      window._onFirebaseData(entries);
    }
    hideSync();
  }catch(e){console.error(e);hideSync();}
};

function showSync(msg){
  document.getElementById('sync-bar').classList.add('show');
  document.getElementById('sync-msg').textContent=msg;
}
function hideSync(){
  setTimeout(()=>document.getElementById('sync-bar').classList.remove('show'),800);
}

onAuthStateChanged(auth,user=>{
  if(user){
    window._currentUser=user;
    document.getElementById('auth-area').innerHTML=
      `<div class="user-chip"><span>${user.displayName||user.email}</span><button class="login-btn" onclick="signOut_()">Uitloggen</button></div>`;
    window._loadFromFirebase(user.uid);
  }
});
</script>

function getRechten(){
  const r=[];const now=new Date();
  for(let y=2017;y<=2099;y++){
    const d=new Date(y+'-10-01');
    if(d>now)break;
    r.push({jaar:`${y}-${y+1}`,datum:`1 okt ${y}`,dagen:30});
  }
  return r;
}

function loadData(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return{entries:JSON.parse(JSON.stringify(INITIAL_ENTRIES))};
}
function saveData(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  if(window._saveToFirebase)window._saveToFirebase(state.entries);
}
let state=loadData();

window._onFirebaseData=function(entries){
  state.entries=entries;
  render();
};

// ── HELPERS ──
function usedTotal(){return state.entries.reduce((s,e)=>s+e.days,0);}
// Yıllar ters sıra — en yeni en üstte
function getYears(){return[...new Set(state.entries.map(e=>e.year))].sort().reverse();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function calcWD(s,e){let n=0;const d=new Date(s),en=new Date(e);while(d<=en){const w=d.getDay();if(w&&w!==6)n++;d.setDate(d.getDate()+1);}return n;}
function autoDays(){
  const s=document.getElementById('f-start').value,e=document.getElementById('f-end').value;
  if(s&&e&&e>=s)document.getElementById('f-days').value=calcWD(s,e);
}

// Tarihten sıralama için ilk tarihi çıkar (DD.MM.YYYY formatından)
function parseSortDate(dateStr){
  const m=dateStr.match(/(\d{2})\.(\d{2})\.(\d{4})/);
  if(m)return new Date(`${m[3]}-${m[2]}-${m[1]}`);
  return new Date(0);
}

function signIn(){if(window._signIn)window._signIn();}
function signOut_(){if(window._signOut)window._signOut();}

function addEntry(){
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value||start;
  const days=parseInt(document.getElementById('f-days').value);
  const note=document.getElementById('f-note').value.trim();
  if(!start){toast('⚠️ Kies een startdatum');return;}
  if(!days||days<1){toast('⚠️ Vul het aantal dagen in');return;}
  const fmt=s=>{const d=new Date(s);return`${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;};
  const dateStr=start===end?fmt(start):`${fmt(start)}-${fmt(end)}`;
  const d=new Date(start);const m=d.getMonth()+1;const y=d.getFullYear();
  const year=m>=9?`${y}-${y+1}`:`${y-1}-${y}`;
  state.entries.push({id:uid(),year,date:dateStr,days,note,startIso:start});
  // Tarihe göre sırala
  state.entries.sort((a,b)=>{
    const da=a.startIso?new Date(a.startIso):parseSortDate(a.date);
    const db=b.startIso?new Date(b.startIso):parseSortDate(b.date);
    return da-db;
  });
  saveData();render();
  toast(`✅ ${days} dag${days>1?'en':''} toegevoegd`);
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-start').value=today;
  document.getElementById('f-end').value=today;
  document.getElementById('f-days').value='';
  document.getElementById('f-note').value='';
}

function delEntry(id){
  if(!confirm('Verwijderen?'))return;
  state.entries=state.entries.filter(e=>e.id!==id);
  saveData();render();toast('🗑 Verwijderd');
}

function render(){
  const rechten=getRechten();
  const totalR=ADMIN_CAP;
  const used=usedTotal();
  const rest=totalR-used;
  const pct=Math.min(100,Math.round(used/totalR*100));

  document.getElementById('balance-strip').innerHTML=
    bCell(totalR,'c-green','Opgebouwd')+
    bCell(used,'c-amber','Gebruikt')+
    bCell(rest,rest>10?'c-green':rest>0?'c-amber':'c-red','Resterend')+
    bCell('30/jr','','Per jaar');

  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-left').textContent=`${used} van ${totalR} gebruikt (${pct}%)`;
  document.getElementById('prog-right').textContent=rest>=0?`${rest} dag${rest===1?'':'en'} resterend`:`${Math.abs(rest)} dagen te veel`;

  let html='';
  getYears().forEach(yr=>{
    const entries=state.entries.filter(e=>e.year===yr);
    const yrUsed=entries.reduce((s,e)=>s+e.days,0);
    const sid='yr_'+yr.replace('-','_');
    // Meest recente jaar open, de rest dicht
    const isOpen=yr===getYears()[0];
    html+=`<div class="yr-block">
      <div class="yr-head" onclick="toggleYr('${sid}')">
        <span class="yr-head-lbl">📅 ${yr}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="pill ${yrUsed>30?'pill-red':yrUsed>20?'pill-amber':'pill-green'}">${yrUsed}d</span>
          <span class="yr-arrow ${isOpen?'open':''}" id="arr_${sid}">▶</span>
        </span>
      </div>
      <div class="yr-entries ${isOpen?'open':''}" id="${sid}">
        ${entries.map(e=>`
          <div class="entry-row">
            <span class="entry-date">${esc(e.date)}</span>
            <span class="pill pill-amber">${e.days}d</span>
            <button class="del-btn" onclick="delEntry('${e.id}')">✕</button>
            ${e.note?`<span class="entry-note">💬 ${esc(e.note)}</span>`:''}
          </div>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('hist-body').innerHTML=html||'<p style="color:var(--text3)">Nog geen items</p>';
  document.getElementById('hist-badge').textContent=`${state.entries.length} items · ${used} dagen`;

  let ytHtml='<tr><th>Schooljaar</th><th class="r">Gebruikt</th><th>Status</th></tr>';
  getYears().forEach(yr=>{
    const d=state.entries.filter(e=>e.year===yr).reduce((s,e)=>s+e.days,0);
    ytHtml+=`<tr><td>${yr}</td><td class="r">${d}</td><td><span class="pill ${d>30?'pill-red':d>20?'pill-amber':'pill-green'}">${d}/30</span></td></tr>`;
  });
  document.getElementById('yr-table').innerHTML=ytHtml;

  let rtHtml='<tr><th>Datum</th><th class="r">Totaal</th></tr>';
  let run=0;
  rechten.forEach(r=>{run+=r.dagen;rtHtml+=`<tr><td>${r.datum}</td><td class="r c-green">+${r.dagen} → ${run}</td></tr>`;});
  rtHtml+=`<tr style="border-top:2px solid var(--border)"><td><strong>Admin-saldo</strong></td><td class="r"><strong>${ADMIN_CAP}</strong></td></tr>`;
  document.getElementById('rights-table').innerHTML=rtHtml;
}

function bCell(n,cls,lbl){return`<div class="bal-cell"><div class="bal-num ${cls}">${n}</div><div class="bal-lbl">${lbl}</div></div>`;}
function toggleYr(id){
  document.getElementById(id)?.classList.toggle('open');
  document.getElementById('arr_'+id)?.classList.toggle('open');
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.style.display='none',2600);
}
window._toast=toast;

document.addEventListener('DOMContentLoaded',()=>{
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-start').value=today;
  document.getElementById('f-end').value=today;
  document.getElementById('f-start').addEventListener('change',autoDays);
  document.getElementById('f-end').addEventListener('change',autoDays);
});
render();
</script>
</body>
</html>
