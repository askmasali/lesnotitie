<title>Ziektedagen — Mustafa</title>

<style>
:root{
  --bg:#f2ede8;--surface:#fff;--surface2:#faf7f4;--border:#e3d9d0;
  --text:#231810;--text2:#7a5c4a;--text3:#b09480;
  --rose:#9e4f6e;--rose2:#f7e4ed;--rose3:#c97a97;
  --green:#1e6b45;--green2:#d4eddf;
  --red:#b83232;--red2:#fde0e0;
  --amber:#b86a1a;--amber2:#fdecd6;
  --blue:#1a4fb8;--blue2:#dce8fd;
  --shadow:0 2px 12px rgba(35,24,16,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app-header{background:var(--text);color:#fff;padding:28px 36px 24px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px}
.app-header h1{font-family:'Fraunces',serif;font-size:40px;font-weight:600;letter-spacing:-1px;line-height:1;color:#e8c8d4}
.app-header .sub{font-size:12px;opacity:.4;letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}
.login-btn{background:var(--rose);border:none;color:#fff;padding:9px 20px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.login-btn:hover{background:var(--rose3)}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;opacity:.7}
.balance-strip{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap}
.bal-cell{padding:18px 28px;border-right:1px solid var(--border);flex:1;min-width:110px}
.bal-cell:last-child{border-right:none}
.bal-num{font-family:'Fraunces',serif;font-size:44px;font-weight:600;line-height:1;letter-spacing:-1px;margin-bottom:4px}
.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-rose{color:var(--rose)}
.bal-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:500}
.progress-section{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 36px}
.prog-bar-bg{height:8px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:6px}
.prog-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),#8fc45a,#e6c840,var(--amber),var(--rose),var(--red));transition:width .6s}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text3)}
.layout{max-width:1080px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
@media(max-width:760px){.layout{grid-template-columns:1fr}.bal-cell{padding:12px 16px}.app-header h1{font-size:28px}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
.card+.card{margin-top:18px}
.card-head{padding:15px 22px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;}
.card-badge{font-size:12px;color:var(--text3)}
.card-body{padding:18px 22px}
.yr-block{margin-bottom:14px}
.yr-block:last-child{margin-bottom:0}
.yr-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:9px;margin-bottom:5px;cursor:pointer;user-select:none;transition:background .15s}
.yr-head:hover{background:var(--border)}
.yr-head-lbl{font-weight:600;font-size:13px;color:var(--text2)}
.yr-arrow{color:var(--text3);font-size:11px;transition:transform .2s;display:inline-block;margin-left:6px}
.yr-arrow.open{transform:rotate(90deg)}
.yr-entries{display:none}
.yr-entries.open{display:block}
.entry-row{display:grid;grid-template-columns:1fr auto 24px;align-items:center;gap:8px;padding:7px 12px;border-radius:7px;margin-bottom:2px;font-size:14px;transition:background .1s}
.entry-row:hover{background:var(--surface2)}
.entry-date{color:var(--text2);font-weight:500}
.pill{font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.pill-amber{background:var(--amber2);color:var(--amber)}
.pill-green{background:var(--green2);color:var(--green)}
.pill-red{background:var(--red2);color:var(--red)}
.pill-rose{background:var(--rose2);color:var(--rose)}
.pill-muted{background:var(--border);color:var(--text3)}
.entry-note{font-size:11px;color:var(--text3);grid-column:1/-1;padding:0 2px 3px;font-style:italic}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 4px;border-radius:4px;transition:color .1s;line-height:1}
.del-btn:hover{color:var(--red)}
.form-grid{display:flex;flex-direction:column;gap:13px}
.form-row{display:flex;gap:9px}
.fg{display:flex;flex-direction:column;gap:5px;flex:1}
.fg label{font-size:11px;font-weight:600;color:var(--rose);text-transform:uppercase;letter-spacing:.9px}
.fg input,.fg textarea{border:1.5px solid var(--border);border-radius:9px;padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;width:100%;min-height:48px}
.fg input[type=date]{cursor:pointer;color-scheme:light}
.fg input:focus,.fg textarea:focus{border-color:var(--rose);box-shadow:0 0 0 3px var(--rose2)}
.fg textarea{resize:vertical;min-height:64px}
.btn{border:none;border-radius:9px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.btn-dark{background:var(--rose);color:#fff}
.btn-dark:hover{background:var(--rose3)}
.mini-table{width:100%;border-collapse:collapse;font-size:13px}
.mini-table th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)}
.mini-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.mini-table tr:last-child td{border-bottom:none}
.mini-table .r{text-align:right;font-weight:700}
.sync-bar{background:var(--rose2);border-bottom:1px solid #e8b8cc;padding:7px 36px;font-size:12px;color:var(--rose);display:none;align-items:center;gap:8px}
.sync-bar.show{display:flex}
.dot{width:7px;height:7px;border-radius:50%;background:var(--rose);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--rose);color:#fff;padding:10px 22px;border-radius:99px;font-size:14px;font-weight:500;display:none;z-index:9999;white-space:nowrap}
/* ── CUSTOM CALENDAR ── */
.cal-input-wrap{position:relative}
.cal-input-wrap input[type=text]{border:1.5px solid var(--border);border-radius:9px;padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;cursor:pointer;caret-color:transparent}
.cal-input-wrap input[type=text]:focus{border-color:var(--rose);box-shadow:0 0 0 3px var(--rose2)}
.cal-popup{display:none;position:fixed;z-index:9999;background:#fff;border:1.5px solid var(--rose);border-radius:12px;box-shadow:0 6px 24px rgba(158,79,110,.2);padding:10px;width:260px}
.cal-popup.open{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav button{background:var(--rose2);border:none;color:var(--rose);border-radius:7px;width:28px;height:28px;font-size:15px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:var(--rose3);color:#fff}
.cal-month-lbl{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:9px;font-weight:700;color:var(--rose);text-transform:uppercase;letter-spacing:.3px;padding:3px 0 5px}
.cal-day{text-align:center;padding:5px 2px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:background .12s,color .12s;color:var(--text)}
.cal-day:hover{background:var(--rose2);color:var(--rose)}
.cal-day.today{border:2px solid var(--rose);color:var(--rose);font-weight:700}
.cal-day.selected{background:var(--rose);color:#fff;font-weight:700}
.cal-day.other-month{color:var(--text3);opacity:.35}
.cal-day.weekend{color:var(--text3)}
.cal-day.empty{cursor:default}

import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyD0SO2m658hN3O8p9GJodODn6kRPuu5iFQ",
  authDomain:"lesnotitie.firebaseapp.com",
  projectId:"lesnotitie",
  storageBucket:"lesnotitie.firebasestorage.app",
  messagingSenderId:"295926362823",
  appId:"1:295926362823:web:4704194a0d80544ad7c4e2"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

window._signIn=async()=>{
  try{await signInWithPopup(auth,provider);}catch(e){console.error(e);}
};
window._signOut=async()=>{
  await signOut(auth);
  window._currentUser=null;
  document.getElementById('auth-area').innerHTML='<button class="login-btn" onclick="signIn()">🔐 Inloggen met Google</button>';
  window._toast('👋 Uitgelogd');
};

window._saveToFirebase=async(entries)=>{
  if(!window._currentUser)return;
  showSync('Opslaan…');
  try{
    await setDoc(doc(db,'ziektedagen',window._currentUser.uid),{
      entries:JSON.stringify(entries),
      updatedAt:new Date().toISOString()
    });
    hideSync();
  }catch(e){console.error(e);hideSync();}
};

window._loadFromFirebase=async(uid)=>{
  showSync('Laden…');
  try{
    const snap=await getDoc(doc(db,'ziektedagen',uid));
    if(snap.exists()&&snap.data().entries){
      const entries=JSON.parse(snap.data().entries);
      window._onFirebaseData(entries);
    }
    hideSync();
  }catch(e){console.error(e);hideSync();}
};

function showSync(msg){
  document.getElementById('sync-bar').classList.add('show');
  document.getElementById('sync-msg').textContent=msg;
}
function hideSync(){
  setTimeout(()=>document.getElementById('sync-bar').classList.remove('show'),800);
}

onAuthStateChanged(auth,user=>{
  if(user){
    window._currentUser=user;
    document.getElementById('auth-area').innerHTML=
      `<div class="user-chip"><span>${user.displayName||user.email}</span><button class="login-btn" onclick="signOut_()">Uitloggen</button></div>`;
    window._loadFromFirebase(user.uid);
  }
});
</script>

function getRechten(){
  // In dienst 17 sep 2017 → eerste 30 dagen recht na 12 mnd = sept 2018
  // Admin verwerkt dit als 1 okt 2018 = eerste toevoeging
  // 1 okt 2017 telt NIET mee (nog geen 12 mnd gewerkt)
  const FIRST_YEAR=2018; // eerste jaar met recht
  const ADMIN_PROCESSED_UNTIL=2025; // laatste verwerkte jaar
  const r=[];
  let run=0;
  const now=new Date();
  for(let y=FIRST_YEAR;y<=2099;y++){
    const d=new Date(y+'-10-01');
    if(d>now)break;
    run+=30;
    const isPending=y>ADMIN_PROCESSED_UNTIL;
    r.push({datum:`1 okt ${y}`,dagen:30,totaal:Math.min(run,isPending?run-30:run+(isPending?0:0)),pending:false,run});
  }
  return r;
}

  // Firebase'den veri geldi — her zaman bunu kullan
  // Eski veri mi kontrol et: doğru toplam 236 olmalı
  const total=entries.reduce((s,e)=>s+e.days,0);
  if(total<230){
    // Firebase'de eski/bozuk veri var, INITIAL_ENTRIES'i yaz
    state.entries=JSON.parse(JSON.stringify(INITIAL_ENTRIES));
    if(window._saveToFirebase)window._saveToFirebase(state.entries);
  } else {
    state.entries=entries;
  }
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  render();
};

// ── HELPERS ──
function usedTotal(){return state.entries.reduce((s,e)=>s+e.days,0);}
// Yıllar ters sıra — en yeni en üstte
function getYears(){return[...new Set(state.entries.map(e=>e.year))].sort().reverse();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function calcWD(s,e){let n=0;const d=new Date(s),en=new Date(e);while(d<=en){const w=d.getDay();if(w&&w!==6)n++;d.setDate(d.getDate()+1);}return n;}
function autoDays(){
  const s=document.getElementById('f-start').value,e=document.getElementById('f-end').value;
  if(s&&e&&e>=s)document.getElementById('f-days').value=calcWD(s,e);
}

// Tarihten sıralama için ilk tarihi çıkar (DD.MM.YYYY formatından)
function parseSortDate(dateStr){
  const m=dateStr.match(/(\d{2})\.(\d{2})\.(\d{4})/);
  if(m)return new Date(`${m[3]}-${m[2]}-${m[1]}`);
  return new Date(0);
}

function signIn(){if(window._signIn)window._signIn();}
function signOut_(){if(window._signOut)window._signOut();}

function addEntry(){
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value||start;
  const days=parseInt(document.getElementById('f-days').value);
  const note=document.getElementById('f-note').value.trim();
  if(!start){toast('⚠️ Kies een startdatum');return;}
  if(!days||days<1){toast('⚠️ Vul het aantal dagen in');return;}
  const fmt=s=>{const d=new Date(s);return`${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;};
  const dateStr=start===end?fmt(start):`${fmt(start)}-${fmt(end)}`;
  const d=new Date(start);const m=d.getMonth()+1;const y=d.getFullYear();
  const year=m>=9?`${y}-${y+1}`:`${y-1}-${y}`;
  state.entries.push({id:uid(),year,date:dateStr,days,note,startIso:start});
  // Tarihe göre sırala
  state.entries.sort((a,b)=>{
    const da=a.startIso?new Date(a.startIso):parseSortDate(a.date);
    const db=b.startIso?new Date(b.startIso):parseSortDate(b.date);
    return da-db;
  });
  saveData();render();
  toast(`✅ ${days} dag${days>1?'en':''} toegevoegd`);
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-start').value=today;
  document.getElementById('f-end').value=today;
  document.getElementById('f-days').value='';
  document.getElementById('f-note').value='';
}

function delEntry(id){
  if(!confirm('Verwijderen?'))return;
  state.entries=state.entries.filter(e=>e.id!==id);
  saveData();render();toast('🗑 Verwijderd');
}

function render(){
  const rechten=getRechten();
  const totalR=ADMIN_CAP;
  const used=usedTotal();
  const rest=totalR-used;
  const pct=Math.min(100,Math.round(used/totalR*100));

  document.getElementById('balance-strip').innerHTML=
    bCell(totalR,'c-green','Opgebouwd')+
    bCell(used,'c-rose','Gebruikt')+
    bCell(rest,rest>10?'c-green':rest>5?'c-amber':'c-red','Resterend')+
    bCell('30/jr','','Per jaar');

  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-left').textContent=`${used} van ${totalR} gebruikt (${pct}%)`;
  document.getElementById('prog-right').textContent=rest>=0?`${rest} dag${rest===1?'':'en'} resterend`:`${Math.abs(rest)} dagen te veel`;

  // Tüm yıllar 2017-2018'den bugüne — 1 Eylül'de yeni yıl oluşur
  const now4=new Date();
  const curYrS=now4.getMonth()>=8?now4.getFullYear():now4.getFullYear()-1;
  const allHistYears=[];
  for(let y=curYrS;y>=2017;y--)allHistYears.push(`${y}-${y+1}`);
  const openYr=allHistYears[0];

  let html='';
  allHistYears.forEach(yr=>{
    const entries=state.entries.filter(e=>e.year===yr);
    const yrUsed=entries.reduce((s,e)=>s+e.days,0);
    const sid='yr_'+yr.replace('-','_');
    const isOpen=yr===openYr;
    const pillCls=yrUsed>30?'pill-red':yrUsed>20?'pill-amber':yrUsed>0?'pill-green':'pill-muted';
    html+=`<div class="yr-block">
      <div class="yr-head" onclick="toggleYr('${sid}')">
        <span class="yr-head-lbl">📅 ${yr}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="pill ${pillCls}">${yrUsed}d</span>
          <span class="yr-arrow ${isOpen?'open':''}" id="arr_${sid}">▶</span>
        </span>
      </div>
      <div class="yr-entries ${isOpen?'open':''}" id="${sid}">
        ${entries.length?entries.map(e=>`
          <div class="entry-row">
            <span class="entry-date">${esc(e.date)}</span>
            <span class="pill pill-amber">${e.days}d</span>
            <button class="del-btn" onclick="delEntry('${e.id}')">✕</button>
            ${e.note?`<span class="entry-note">💬 ${esc(e.note)}</span>`:''}
          </div>`).join(''):'<div style="padding:6px 12px;font-size:13px;color:var(--text3)">Geen ziektedagen dit jaar</div>'}
      </div>
    </div>`;
  });
  document.getElementById('hist-body').innerHTML=html||'<p style="color:var(--text3)">Nog geen items</p>';
  document.getElementById('hist-badge').textContent=`${state.entries.length} items · ${used} dagen`;

  let ytHtml='<tr><th>Schooljaar</th><th class="r">Gebruikt</th><th>Status</th></tr>';
  // Tüm yılları 2017-2018'den bugüne kadar oluştur
  const now3=new Date();
  const curYrStart=now3.getMonth()>=8?now3.getFullYear():now3.getFullYear()-1;
  const allSchoolYears=[];
  for(let y=curYrStart;y>=2017;y--){
    allSchoolYears.push(`${y}-${y+1}`);
  }
  allSchoolYears.forEach(yr=>{
    const d=state.entries.filter(e=>e.year===yr).reduce((s,e)=>s+e.days,0);
    const is1718=yr==='2017-2018';
    ytHtml+=`<tr><td>${yr}</td><td class="r">${d}</td><td>${is1718
      ?`<span class="pill pill-muted" style="font-size:10px">Eerste jaar</span>`
      :`<span class="pill ${d>30?'pill-red':d>20?'pill-amber':d>0?'pill-green':'pill-muted'}">${d}/30</span>`
    }</td></tr>`;
  });
  document.getElementById('yr-table').innerHTML=ytHtml;

  let rtHtml='<tr><th>Datum</th><th class="r">Dagen</th></tr>';
  rechten.forEach(r=>{
    rtHtml+=`<tr><td>${r.datum}</td><td class="r c-green">+${r.dagen} → ${r.run}</td></tr>`;
  });
  // Volgende verwachte
  const lastRun=rechten.length?rechten[rechten.length-1].run:0;
  const now2=new Date();
  const nextOktY=now2>new Date(now2.getFullYear()+'-10-01')?now2.getFullYear()+1:now2.getFullYear();
  rtHtml+=`<tr style="border-top:2px solid var(--border);opacity:.4"><td style="font-style:italic">1 okt ${nextOktY} (verwacht)</td><td class="r">+30 → ${lastRun+30}</td></tr>`;
  document.getElementById('rights-table').innerHTML=rtHtml;
}

function bCell(n,cls,lbl){return`<div class="bal-cell"><div class="bal-num ${cls}">${n}</div><div class="bal-lbl">${lbl}</div></div>`;}
function toggleYr(id){
  document.getElementById(id)?.classList.toggle('open');

}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.style.display='none',2600);
}

// ── CUSTOM CALENDAR ──
const calState={start:{y:new Date().getFullYear(),m:new Date().getMonth()},end:{y:new Date().getFullYear(),m:new Date().getMonth()}};
const DAYS=['Ma','Di','Wo','Do','Vr','Za','Zo'];
const MONTHS=['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];

function toggleCal(which){
  const other=which==='start'?'end':'start';
  document.getElementById('cal-'+other).classList.remove('open');
  const el=document.getElementById('cal-'+which);
  const wasOpen=el.classList.contains('open');
  el.classList.remove('open');
  if(wasOpen)return;
  // Pozisyonu input'un altına fixed olarak ayarla
  const inp=document.getElementById('f-'+which+'-display');
  const rect=inp.getBoundingClientRect();
  el.style.top=(rect.bottom+6)+'px';
  el.style.left=rect.left+'px';
  el.classList.add('open');
  renderCal(which);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.cal-input-wrap')&&!e.target.closest('.cal-popup')){
    ['start','end'].forEach(w=>document.getElementById('cal-'+w).classList.remove('open'));
  }
});

function renderCal(which){
  const s=calState[which];
  const el=document.getElementById('cal-'+which);
  const today=new Date();today.setHours(0,0,0,0);
  const selVal=document.getElementById('f-'+which).value;
  const selDate=selVal?new Date(selVal):null;if(selDate)selDate.setHours(0,0,0,0);
  const first=new Date(s.y,s.m,1);
  // Monday-first: 0=Mon..6=Sun
  let startDow=(first.getDay()+6)%7;
  const daysInMonth=new Date(s.y,s.m+1,0).getDate();
  let html=`<div class="cal-nav">
    <button onclick="calMove('${which}',-1,event)">‹</button>
    <span class="cal-month-lbl">${MONTHS[s.m]} ${s.y}</span>
    <button onclick="calMove('${which}',1,event)">›</button>
  </div><div class="cal-grid">`;
  DAYS.forEach(d=>html+=`<div class="cal-dow">${d}</div>`);
  // prev month days
  const prevDays=new Date(s.y,s.m,0).getDate();
  for(let i=startDow-1;i>=0;i--)html+=`<div class="cal-day other-month empty">${prevDays-i}</div>`;
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(s.y,s.m,d);date.setHours(0,0,0,0);
    const dow=(date.getDay()+6)%7;
    const isToday=date.getTime()===today.getTime();
    const isSel=selDate&&date.getTime()===selDate.getTime();
    const isWeekend=dow>=5;
    let cls='cal-day';
    if(isToday)cls+=' today';
    if(isSel)cls+=' selected';
    if(isWeekend&&!isSel)cls+=' weekend';
    html+=`<div class="${cls}" onclick="pickDay('${which}',${s.y},${s.m},${d})">${d}</div>`;
  }
  // next month filler
  const total=startDow+daysInMonth;const remainder=total%7;
  if(remainder>0)for(let d=1;d<=7-remainder;d++)html+=`<div class="cal-day other-month empty">${d}</div>`;
  html+='</div>';
  el.innerHTML=html;
}

function calMove(which,dir,e){
  e.stopPropagation();
  calState[which].m+=dir;
  if(calState[which].m>11){calState[which].m=0;calState[which].y++;}
  if(calState[which].m<0){calState[which].m=11;calState[which].y--;}
  renderCal(which);
}

function pickDay(which,y,m,d){
  const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const disp=`${String(d).padStart(2,'0')}.${String(m+1).padStart(2,'0')}.${y}`;
  document.getElementById('f-'+which).value=iso;
  document.getElementById('f-'+which+'-display').value=disp;
  document.getElementById('cal-'+which).classList.remove('open');
  // If start picked and end is empty or before start, set end = start
  if(which==='start'){
    const endVal=document.getElementById('f-end').value;
    if(!endVal||endVal<iso){
      document.getElementById('f-end').value=iso;
      document.getElementById('f-end-display').value=disp;
      calState.end={y,m};
    }
  }
  autoDays();
}

function autoDays(){
  const s=document.getElementById('f-start').value,e=document.getElementById('f-end').value;
  if(s&&e&&e>=s)document.getElementById('f-days').value=calcWD(s,e);
}

document.addEventListener('DOMContentLoaded',()=>{
  // Set today as default in display
  const today=new Date();

  const disp=`${String(today.getDate()).padStart(2,'0')}.${String(today.getMonth()+1).padStart(2,'0')}.${today.getFullYear()}`;
