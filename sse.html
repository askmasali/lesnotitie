<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSE Financiën</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --bg:#fdf6f0; --surface:#fff; --surface2:#fef3fb; --border:#f0dff5;
  --text:#3d2c3e; --text2:#7a5c7e; --text3:#b89abc;
  --accent1:#c084fc; --accent2:#f9a8d4;
  --cream:#fef9ee; --radius:14px;
  --shadow:0 2px 16px rgba(192,132,252,.10);
  --shadow2:0 4px 24px rgba(192,132,252,.20);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:14px;height:66px;box-shadow:var(--shadow);flex-wrap:nowrap;}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.year-sel{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;padding:6px 18px;border-radius:24px;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 2px 8px rgba(192,132,252,.3);}
.nav-tabs{display:flex;gap:5px;margin-left:auto;}
.nav-tab{padding:8px 18px;border-radius:24px;cursor:pointer;font-weight:700;font-size:13px;border:1.5px solid transparent;background:transparent;color:var(--text2);transition:all .15s;font-family:'Nunito',sans-serif;white-space:nowrap;}
.nav-tab.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;box-shadow:0 2px 10px rgba(192,132,252,.35);}
.nav-tab:hover:not(.active){background:var(--surface2);border-color:var(--border);}

/* LAYOUT */
.main{max-width:1200px;margin:0 auto;padding:20px;}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:18px;margin-bottom:16px;box-shadow:var(--shadow);}
.sec-label{font-size:11px;font-weight:900;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.stat{border-radius:var(--radius);border:1.5px solid var(--border);padding:16px;text-align:center;}
.stat-val{font-size:24px;font-weight:900;}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.7px;}
.s-in{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-color:#86efac;}
.s-out{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fca5a5;}
.s-debt{background:linear-gradient(135deg,#fff7ed,#ffedd5);border-color:#fdba74;}
.s-pos{background:linear-gradient(135deg,var(--accent1),var(--accent2));border-color:transparent;}
.s-pos .stat-val,.s-pos .stat-label{color:#fff;}
.s-neg{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-color:#fca5a5;}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1.5px solid var(--border);background:#fff;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:11px 14px;text-align:left;font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--cream);border-bottom:1.5px solid var(--border);white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px;color:var(--text);background:#fff;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fdf4ff !important;}
.ain{color:#16a34a;font-weight:800;}
.aout{color:#dc2626;font-weight:800;}
.adebt{color:#ea580c;font-weight:800;}

/* BADGES */
.cat-badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:700;}
.cat-erasmus{background:#dbeafe;color:#1e40af;}
.cat-donatie{background:#fdf4ff;color:#7e22ce;}
.cat-lening{background:#fff7ed;color:#9a3412;}
.cat-lidgeld{background:#f0fdf4;color:#166534;}
.cat-subsidie{background:#fef9c3;color:#854d0e;}
.cat-overig_in,.cat-overig_uit,.cat-overig{background:#f8fafc;color:#64748b;}
.cat-kira{background:#fef9c3;color:#854d0e;}
.cat-bank{background:#f1f5f9;color:#475569;}
.cat-materiaal{background:#fce7f3;color:#be185d;}
.cat-activiteit{background:#ede9fe;color:#6d28d9;}
.cat-admin{background:#f0f9ff;color:#0369a1;}
.cat-terugbetaling{background:#fef2f2;color:#991b1b;}

/* BUTTONS */
.btn{padding:7px 15px;border-radius:20px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:all .15s;font-family:'Nunito',sans-serif;}
.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(192,132,252,.25);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-danger{background:#fef2f2;color:#991b1b;border:1.5px solid #fca5a5;}
.btn-success{background:#f0fdf4;color:#166534;border:1.5px solid #86efac;}
.btn-ghost{background:transparent;color:var(--text2);}
.btn-sm{padding:4px 10px;font-size:10px;}
.btn-icon{padding:4px 7px;border-radius:7px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(61,44,62,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal-box{background:var(--surface);border-radius:18px;border:2px solid var(--border);padding:24px;width:95%;max-width:480px;box-shadow:var(--shadow2);animation:pop .18s ease;max-height:90vh;overflow-y:auto;}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;font-family:'Nunito',sans-serif;color:var(--text);background:var(--cream);outline:none;transition:border .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent1);}
.form-textarea{resize:vertical;min-height:54px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.iban-btns{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border-radius:12px;padding:11px 18px;font-weight:700;font-size:13px;z-index:2000;box-shadow:0 6px 20px rgba(192,132,252,.4);animation:slideup .2s ease;}
@keyframes slideup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* FILTER */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.chip{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .12s;font-family:'Nunito',sans-serif;}
.chip.active{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border-color:transparent;}
.chip:hover:not(.active){background:var(--surface2);}

/* DEBT PROGRESS */
.dprog{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:5px;}
.dprog-fill{height:100%;background:linear-gradient(90deg,#22c55e,#86efac);border-radius:4px;transition:width .3s;}

/* CHART */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.chart-box{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:16px;box-shadow:var(--shadow);}
.chart-title{font-size:11px;font-weight:800;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px;}
.chart-desc{font-size:10px;color:var(--text3);margin-bottom:10px;}
canvas{max-height:200px;}

@media(max-width:640px){.form-row{grid-template-columns:1fr;}.chart-grid{grid-template-columns:1fr;}.nav-tab{padding:4px 8px;font-size:10px;}}
@media print{header,.btn,.filter-bar,#auth-area{display:none!important;}.main{padding:8px;}}

/* FLATPICKR PURPLE THEME */
.flatpickr-calendar{background:#fff;border:2px solid var(--border);border-radius:16px;box-shadow:0 8px 32px rgba(192,132,252,.2);font-family:'Nunito',sans-serif;padding:4px;}
.flatpickr-months{background:linear-gradient(135deg,var(--accent1),var(--accent2));border-radius:12px 12px 0 0;padding:6px 0;}
.flatpickr-months .flatpickr-prev-month,.flatpickr-months .flatpickr-next-month{color:#fff;fill:#fff;padding:6px 12px;}
.flatpickr-months .flatpickr-prev-month:hover,.flatpickr-months .flatpickr-next-month:hover{background:rgba(255,255,255,.2);border-radius:8px;}
.flatpickr-months .flatpickr-month{background:transparent;}
.flatpickr-current-month{color:#fff;font-size:15px;font-weight:800;}
.flatpickr-current-month .numInput,.flatpickr-current-month .flatpickr-monthDropdown-months{color:#fff;font-weight:800;background:transparent;border:none;}
.flatpickr-weekdays{background:var(--surface2);margin-top:4px;}
span.flatpickr-weekday{color:var(--text2);font-weight:800;font-size:11px;}
.flatpickr-day{border-radius:10px;font-weight:600;color:var(--text);}
.flatpickr-day:hover{background:var(--surface2);border-color:var(--accent1);}
.flatpickr-day.selected,.flatpickr-day.selected:hover{background:linear-gradient(135deg,var(--accent1),var(--accent2));border-color:transparent;color:#fff;font-weight:800;box-shadow:0 2px 8px rgba(192,132,252,.4);}
.flatpickr-day.today{border-color:var(--accent2);color:var(--accent1);font-weight:800;}
.flatpickr-day.today.selected{color:#fff;}
.flatpickr-day.flatpickr-disabled{color:var(--text3);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <span class="logo">💰 SSE Financiën</span>
  <select class="year-sel" id="year-sel" onchange="setYear(this.value)"></select>
  <div id="auth-area"></div>
  <div class="nav-tabs">
    <button class="nav-tab" onclick="go('overzicht')">📊 Overzicht</button>
    <button class="nav-tab" onclick="go('inkomsten')">💚 Inkomsten</button>
    <button class="nav-tab" onclick="go('uitgaven')">💸 Uitgaven</button>
    <button class="nav-tab" onclick="go('schulden')">🔴 Schulden</button>
    <button class="nav-tab" onclick="go('grafieken')">📈 Grafieken</button>
  </div>
</header>

<div class="main" id="app"></div>
<div id="modal-root"></div>
<div id="toast-el" style="display:none" class="toast"></div>

<script type="module">
// ── FIREBASE ──────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const FB = { apiKey:"AIzaSyD0SO2m658hN3O8p9GJodODn6kRPuu5iFQ", authDomain:"lesnotitie.firebaseapp.com", projectId:"lesnotitie", storageBucket:"lesnotitie.firebasestorage.app", messagingSenderId:"295926362823", appId:"1:295926362823:web:4704194a0d80544ad7c4e2" };
const app = initializeApp(FB);
const db  = getFirestore(app);
const auth = getAuth(app);
const prov = new GoogleAuthProvider();

let currentUser = null;

onAuthStateChanged(auth, async u => {
  currentUser = u;
  renderAuthUI();
  if (u) {
    await fbLoad(u.uid);
  }
});

async function fbSave() {
  if (!currentUser) return;
  try {
    await setDoc(doc(db,'sse_finance',currentUser.uid), { data: JSON.stringify(S), ts: Date.now() });
  } catch(e){ console.warn('fbSave error',e); }
}

async function fbLoad(uid) {
  try {
    const snap = await getDoc(doc(db,'sse_finance',uid));
    if (snap.exists()) {
      const p = JSON.parse(snap.data().data);
      if (p.incomes)  S.incomes  = p.incomes;
      if (p.expenses) S.expenses = p.expenses;
      if (p.debts)    S.debts    = p.debts;
      if (p.years)    S.years    = p.years;
      if (p.year)     S.year     = p.year;
      ensureAutoDebts();
      buildYearSel();
      render();
      toast('☁️ Cloud data geladen!');
    }
  } catch(e){ console.warn('fbLoad error',e); }
}

function renderAuthUI() {
  const el = document.getElementById('auth-area');
  if (!el) return;
  if (currentUser) {
    el.innerHTML = `<div style="display:flex;align-items:center;gap:7px">
      <img src="${currentUser.photoURL||''}" style="width:24px;height:24px;border-radius:50%;border:2px solid var(--accent1)" onerror="this.style.display='none'">
      <span style="font-size:11px;font-weight:700;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${currentUser.displayName||currentUser.email}</span>
      <button class="btn btn-secondary btn-sm" onclick="window._out()">Uitloggen</button>
    </div>`;
  } else {
    el.innerHTML = `<button class="btn btn-primary btn-sm" onclick="window._in()">
      <svg width="12" height="12" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:3px"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google ile giriş yap
    </button>`;
  }
}
window._in  = () => signInWithPopup(auth, prov).catch(()=>{});
window._out = async () => { if(!confirm('Uitloggen?'))return; await signOut(auth); currentUser=null; renderAuthUI(); };
window.fbSave = fbSave;
window.fbLoad = fbLoad;

</script>
<script>
// ── STATE ──────────────────────────────────────────────────────
const IBAN_DERNEK  = 'BE68 7390 3074 2634';
const IBAN_MUSTAFA = 'BE10 7350 7584 5904';

const MAANDEN = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const MSHORT  = ['Jan','Feb','Maa','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

const ICAT = [
  {id:'erasmus',  label:'Erasmus+',      icon:'🇪🇺'},
  {id:'donatie',  label:'Donatie/Bağış', icon:'🎁'},
  {id:'lening',   label:'Lening (borç)', icon:'🔄'},
  {id:'lidgeld',  label:'Lidgeld',       icon:'👥'},
  {id:'subsidie', label:'Subsidie',      icon:'🏛️'},
  {id:'overig_in',label:'Overig',        icon:'➕'},
];
const ECAT = [
  {id:'kira',          label:'Huur/Kira',         icon:'🏠'},
  {id:'bank',          label:'Bankkosten',         icon:'🏦'},
  {id:'materiaal',     label:'Materiaal',          icon:'📦'},
  {id:'activiteit',    label:'Activiteit',         icon:'🎯'},
  {id:'admin',         label:'Administratie',      icon:'📋'},
  {id:'terugbetaling', label:'Lening terugbetal.', icon:'💳'},
  {id:'overig_uit',    label:'Overig',             icon:'➖'},
];

let S = { year: new Date().getFullYear(), years:[new Date().getFullYear()], incomes:[], expenses:[], debts:[] };
let view = 'overzicht';
let fMonth = 'all', fCat = 'all';

// ── PERSIST ───────────────────────────────────────────────────
function save() {
  try { localStorage.setItem('sse_v2', JSON.stringify(S)); } catch(e){}
  if(window.fbSave) window.fbSave();
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('sse_v2');
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.incomes)  S.incomes  = p.incomes;
    if (p.expenses) S.expenses = p.expenses;
    if (p.debts)    S.debts    = p.debts;
    if (p.years)    S.years    = p.years;
    if (p.year)     S.year     = p.year;
  } catch(e){}
}

// ── AUTO DEBTS ────────────────────────────────────────────────
function ensureAutoDebts() {
  const now  = new Date();
  let changed = false;

  // Monthly huur Jan 2026 → now
  for (let y = 2026; y <= now.getFullYear(); y++) {
    const mEnd = (y === now.getFullYear()) ? now.getMonth() : 11;
    for (let m = 0; m <= mEnd; m++) {
      const name = `Mustafa Turk — Huur ${MAANDEN[m]} ${y}`;
      if (!S.debts.find(d => d.name === name)) {
        S.debts.push({ id:uid(), name, total:500, paid:0,
          dueDate:`${y}-${String(m+1).padStart(2,'0')}-02`,
          note:'Automatisch — maandelijkse huur Zavelputstraat 18', year:y });
        changed = true;
      }
    }
  }

  // One-time vaste schulden
  const vaste = [
    { name:'KBC Business PRO — jaarlijkse kost 2026', total:51,     dueDate:'2026-03-05', note:`Bankkosten jaarlijks. Van: ${IBAN_MUSTAFA} → Naar: ${IBAN_DERNEK}`, year:2026 },
    { name:'FOD Justitie — registratiekosten VZW',    total:173.76, dueDate:'2026-01-02', note:'Neerlegging statuten + publicatie Belgisch Staatsblad. Registratie Smart Skills Education VZW', year:2026 },
  ];
  vaste.forEach(v => {
    if (!S.debts.find(d => d.name === v.name)) {
      S.debts.push({ id:uid(), paid:0, ...v });
      changed = true;
    }
  });

  if (changed) save();
}

// ── HELPERS ──────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,10); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ return '€\u00a0' + parseFloat(n||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtD(iso){ if(!iso)return''; const[y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function catL(id,inc){ return (inc?ICAT:ECAT).find(c=>c.id===id)?.label||id; }
function catI(id,inc){ return (inc?ICAT:ECAT).find(c=>c.id===id)?.icon||'📌'; }
function sumOf(arr){ return arr.reduce((s,x)=>s+parseFloat(x.amount||0),0); }
function getYr(x){ return x.year||(x.date?new Date(x.date).getFullYear():S.year); }

// ── YEAR SELECT ───────────────────────────────────────────────
function buildYearSel() {
  const sel = document.getElementById('year-sel');
  if (!sel) return;
  const yrs = [...new Set([...S.years, S.year])].sort((a,b)=>b-a);
  sel.innerHTML = yrs.map(y=>`<option value="${y}" ${y==S.year?'selected':''}>${y}</option>`).join('');
}
window.setYear = (y) => { S.year=parseInt(y); if(!S.years.includes(parseInt(y)))S.years.push(parseInt(y)); save(); render(); };
window.addYear = () => {
  const y=parseInt(prompt('Nieuw jaar (bijv. 2027):'));
  if(!y||isNaN(y))return;
  if(!S.years.includes(y))S.years.push(y);
  S.year=y; save(); buildYearSel(); render(); toast(`✅ ${y} toegevoegd`);
};

// ── NAVIGATION ────────────────────────────────────────────────
window.go = (v) => {
  view=v; fMonth='all'; fCat='all';
  try { localStorage.setItem('sse_view',v); } catch(e){}
  render();
};

function render() {
  // nav tabs
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{
    t.classList.toggle('active',['overzicht','inkomsten','uitgaven','schulden','grafieken'][i]===view);
  });
  // destroy charts
  if(typeof Chart!=='undefined') Object.values(Chart.instances||{}).forEach(c=>{try{c.destroy();}catch(e){}});
  // render view
  const app = document.getElementById('app');
  if (view==='overzicht')   app.innerHTML = vOverzicht();
  else if(view==='inkomsten') app.innerHTML = vInkomsten();
  else if(view==='uitgaven')  app.innerHTML = vUitgaven();
  else if(view==='schulden')  app.innerHTML = vSchulden();
  else if(view==='grafieken'){ app.innerHTML = vGrafieken(); setTimeout(drawCharts,60); }
}

// ── FILTER HELPERS ────────────────────────────────────────────
function filtered(arr) {
  return arr.filter(x => {
    if (getYr(x) != S.year) return false;
    if (fMonth !== 'all' && new Date(x.date).getMonth() != fMonth) return false;
    if (fCat   !== 'all' && x.category !== fCat) return false;
    return true;
  });
}

function filterBar(type) {
  const cats = type==='income'?ICAT:ECAT;
  return `<div class="filter-bar">
    <span class="chip ${fMonth==='all'?'active':''}" onclick="fMonth='all';render()">Alle maanden</span>
    ${MAANDEN.map((m,i)=>`<span class="chip ${fMonth==i?'active':''}" onclick="fMonth=${i};render()">${m.slice(0,3)}</span>`).join('')}
  </div>
  <div class="filter-bar">
    <span class="chip ${fCat==='all'?'active':''}" onclick="fCat='all';render()">Alle</span>
    ${cats.map(c=>`<span class="chip ${fCat===c.id?'active':''}" onclick="fCat='${c.id}';render()">${c.icon} ${c.label}</span>`).join('')}
  </div>`;
}

// ── VIEWS ──────────────────────────────────────────────────────
function vOverzicht() {

    mIn:  inc.filter(x=>new Date(x.date).getMonth()===i).reduce((s,x)=>s+parseFloat(x.amount||0),0),

  const incByCat = ICAT.map(c=>({...c,tot:inc.filter(x=>x.category===c.id).reduce((s,x)=>s+parseFloat(x.amount||0),0)})).filter(c=>c.tot>0);
  const expByCat = ECAT.map(c=>({...c,tot:exp.filter(x=>x.category===c.id).reduce((s,x)=>s+parseFloat(x.amount||0),0)})).filter(c=>c.tot>0);
  const openDebts = S.debts.filter(d=>parseFloat(d.paid||0)<parseFloat(d.total||0));

  return `

    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="addYear()">+ Jaar</button>
      <button class="btn btn-secondary btn-sm" onclick="window.print()">📄 PDF</button>
      <button class="btn btn-secondary btn-sm" onclick="doCSV()">📊 CSV</button>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat s-in"><div class="stat-val" style="color:#16a34a">${fmt(tIn)}</div><div class="stat-label">💚 Inkomsten</div></div>
    <div class="stat s-out"><div class="stat-val" style="color:#dc2626">${fmt(tOut)}</div><div class="stat-label">💸 Uitgaven</div></div>
    <div class="stat s-debt"><div class="stat-val" style="color:#ea580c">${fmt(tDebt)}</div><div class="stat-label">🔴 Open Schulden</div></div>
    <div class="stat ${bal>=0?'s-pos':'s-neg'}"><div class="stat-val">${fmt(bal)}</div><div class="stat-label">${bal>=0?'✅ Netto Saldo':'⚠️ Negatief'}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card" style="margin-bottom:0">
      <div class="sec-label">📅 Maandoverzicht ${yr}</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Maand</th><th>Inkomsten</th><th>Uitgaven</th><th>Saldo</th></tr></thead>
        <tbody>
          ${mData.map((d,i)=>{
            if(!d.mIn&&!d.mOut) return `<tr><td style="color:var(--text3);font-size:11px">${MAANDEN[i]}</td><td style="color:var(--text3)">—</td><td style="color:var(--text3)">—</td><td style="color:var(--text3)">—</td></tr>`;
            const s=d.mIn-d.mOut;
            return `<tr><td style="font-weight:700">${MAANDEN[i]}</td><td class="ain">${fmt(d.mIn)}</td><td class="aout">${fmt(d.mOut)}</td><td class="${s>=0?'ain':'aout'}">${fmt(s)}</td></tr>`;

    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="card" style="margin-bottom:0;flex:1">
        <div class="sec-label">🕐 Recente transacties</div>
        ${recent.length===0?'<p style="color:var(--text3);font-size:12px">Nog geen transacties</p>':
          recent.map(x=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(x.description||catL(x.category,x.t==='in'))}</div>
            <div style="font-size:9px;color:var(--text3)">${fmtD(x.date)} · ${catI(x.category,x.t==='in')} ${catL(x.category,x.t==='in')}</div></div>
            <span class="${x.t==='in'?'ain':'aout'}" style="font-size:12px;font-weight:800;margin-left:8px;white-space:nowrap">${x.t==='in'?'+':'-'}${fmt(x.amount)}</span>
          </div>`).join('')}
      </div>
      ${openDebts.length>0?`<div class="card" style="margin-bottom:0;background:linear-gradient(135deg,#fff7ed,#ffedd5);border-color:#fdba74">
        <div class="sec-label" style="color:#9a3412">🔴 Open schulden</div>

      ${incByCat.length===0?'<p style="color:var(--text3);font-size:12px">Nog geen inkomsten</p>':
        incByCat.map(c=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="font-weight:700">${c.icon} ${c.label}</span><span class="ain">${fmt(c.tot)}</span></div>`).join('')}

    <div class="card" style="margin-bottom:0">
      <div class="sec-label">💸 Uitgaven per categorie</div>

        expByCat.map(c=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="font-weight:700">${c.icon} ${c.label}</span><span class="aout">${fmt(c.tot)}</span></div>`).join('')}
    </div>
  </div>
  <div class="card" style="background:linear-gradient(135deg,#f5e6ff,#fff0fa)">

    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="go('inkomsten')">💚 + Inkomst</button>
      <button class="btn btn-primary btn-sm" onclick="go('uitgaven')">💸 + Uitgave</button>
      <button class="btn btn-primary btn-sm" onclick="go('schulden')">🔴 + Schuld</button>

function vSchulden() {
  const all = [...S.debts].sort((a,b)=>new Date(b.dueDate||'2099')-new Date(a.dueDate||'2099'));
  const open = all.filter(d=>parseFloat(d.paid||0)<parseFloat(d.total||0));
  const paid = all.filter(d=>parseFloat(d.paid||0)>=parseFloat(d.total||0));
  const tDebt = open.reduce((s,d)=>s+Math.max(0,parseFloat(d.total||0)-parseFloat(d.paid||0)),0);

  function debtCard(d) {
    const tot=parseFloat(d.total||0), p=parseFloat(d.paid||0);
    const rem=Math.max(0,tot-p), pct=tot>0?Math.min(100,p/tot*100):0;
    const done=rem<=0;
    return `<div style="padding:13px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:9px;background:${done?'#f0fdf4':'#fff'}">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:7px">
        <div style="flex:1">
          <div style="font-weight:800;font-size:13px">${esc(d.name)}</div>
          ${d.note?`<div style="font-size:10px;color:var(--text2);margin-top:2px">📝 ${esc(d.note)}</div>`:''}
          <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
            <span style="font-size:10px;color:var(--text3)">💰 Totaal: <b>${fmt(tot)}</b></span>
            <span style="font-size:10px;color:#16a34a">✅ Betaald: <b>${fmt(p)}</b></span>
            <span style="font-size:10px;color:#ea580c">🔴 Resterend: <b>${fmt(rem)}</b></span>
            ${d.dueDate?`<span style="font-size:10px;color:var(--text3)">📅 Vervaldag: <b>${fmtD(d.dueDate)}</b></span>`:''}
          </div>
        </div>
        <div style="text-align:right;margin-left:10px">
          <div style="font-size:20px;font-weight:900;color:${done?'#16a34a':'#ea580c'}">${fmt(rem)}</div>
          <div style="font-size:9px;color:var(--text3)">nog te betalen</div>
        </div>
      </div>
      <div class="dprog"><div class="dprog-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:7px">
        <span style="font-size:10px;color:var(--text3);font-weight:700">${pct.toFixed(0)}% betaald</span>
        <div style="display:flex;gap:5px">
          ${!done?`<button class="btn btn-success btn-sm" onclick="mPayDebt('${d.id}')">💳 Betaling registreren</button>`:'<span style="font-size:11px;color:#16a34a;font-weight:700">✅ Volledig betaald</span>'}
          <button class="btn btn-secondary btn-sm btn-icon" onclick="mEditDebt('${d.id}')">✏️</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="delDebt('${d.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div style="font-family:'Playfair Display',serif;font-size:22px">🔴 Schulden & Te betalen</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="window.print()">📄 PDF</button>
      <button class="btn btn-secondary btn-sm" onclick="doCSV('debt')">📊 CSV</button>
      <button class="btn btn-primary" onclick="mAddDebt()">+ Schuld toevoegen</button>
    </div>
  </div>
  <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat s-debt"><div class="stat-val" style="color:#ea580c">${fmt(tDebt)}</div><div class="stat-label">🔴 Nog te betalen</div></div>
    <div class="stat s-out"><div class="stat-val" style="color:#dc2626">${open.length}</div><div class="stat-label">⚠️ Open schulden</div></div>
    <div class="stat s-in"><div class="stat-val" style="color:#16a34a">${paid.length}</div><div class="stat-label">✅ Afbetaald</div></div>
  </div>
  ${open.length>0?`<div class="card"><div class="sec-label">⚠️ Openstaande schulden</div>${open.map(debtCard).join('')}</div>`:''}
  ${paid.length>0?`<div class="card"><div class="sec-label">✅ Afbetaalde schulden</div>${paid.map(debtCard).join('')}</div>`:''}
  ${all.length===0?`<div class="card" style="text-align:center;padding:36px;color:var(--text3)">Nog geen schulden ingevoerd</div>`:''}`;
}

function drawCharts() {
  const yr=S.year;
  const inc=S.incomes.filter(x=>getYr(x)==yr), exp=S.expenses.filter(x=>getYr(x)==yr);
  const colors=['#86efac','#93c5fd','#fde68a','#c4b5fd','#fed7aa','#a5f3fc'];
  const colors2=['#fca5a5','#fdba74','#fde047','#f9a8d4','#a5b4fc','#6ee7b7'];

  const incByCat=ICAT.map((c,i)=>({label:c.icon+' '+c.label,val:inc.filter(x=>x.category===c.id).reduce((s,x)=>s+parseFloat(x.amount||0),0),col:colors[i]})).filter(c=>c.val>0);
  const expByCat=ECAT.map((c,i)=>({label:c.icon+' '+c.label,val:exp.filter(x=>x.category===c.id).reduce((s,x)=>s+parseFloat(x.amount||0),0),col:colors2[i]})).filter(c=>c.val>0);
  const mIn=MAANDEN.map((_,i)=>inc.filter(x=>new Date(x.date).getMonth()===i).reduce((s,x)=>s+parseFloat(x.amount||0),0));
  const mOut=MAANDEN.map((_,i)=>exp.filter(x=>new Date(x.date).getMonth()===i).reduce((s,x)=>s+parseFloat(x.amount||0),0));
  let cum=0; const cumData=MAANDEN.map((_,i)=>{cum+=mIn[i]-mOut[i];return cum;});

  // Register datalabels plugin if available
  if(window.ChartDataLabels) Chart.register(ChartDataLabels);

  const dlPlugin = window.ChartDataLabels ? [ChartDataLabels] : [];

  const donutOpts = (total) => ({
    plugins:{
      legend:{position:'bottom',labels:{font:{family:'Nunito',size:12},padding:12}},
      datalabels:{
        display: ctx => (ctx.dataset.data[ctx.dataIndex]/total*100) >= 4,
        color:'#fff',
        font:{family:'Nunito',size:12,weight:'bold'},
        formatter:(val,ctx)=>{
          const pct=(val/total*100).toFixed(0);
          const eur='€'+val.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
          return eur+'\n'+pct+'%';
        },
        textStrokeColor:'rgba(0,0,0,.25)',textStrokeWidth:3,
        textAlign:'center',
      }
    },
    responsive:true,maintainAspectRatio:true
  });

  const barOpts = {
    plugins:{
      legend:{position:'bottom',labels:{font:{family:'Nunito',size:11}}},
      datalabels:{
        display: ctx => ctx.dataset.data[ctx.dataIndex]>0,
        anchor:'end',align:'end',
        color:ctx=>ctx.datasetIndex===0?'#16a34a':'#dc2626',

// ── MODAL SYSTEM ──────────────────────────────────────────────
function showModal(html) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal-box">${html}</div></div>`;
  // Init flatpickr on all date inputs in modal
  setTimeout(() => {
    root.querySelectorAll('input[type="date"]').forEach(el => {
      if (el._flatpickr) return;
      flatpickr(el, {
        dateFormat: 'Y-m-d',
        locale: {
          firstDayOfWeek: 1,
          weekdays: { shorthand:['Zo','Ma','Di','Wo','Do','Vr','Za'], longhand:['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'] },
          months: { shorthand:['Jan','Feb','Maa','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'], longhand:['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'] }
        },
        allowInput: true,
      });
    });
  }, 50);
}
function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}
window.closeModal = closeModal;

// ── EXPORT ────────────────────────────────────────────────────
window.doCSV = (type) => {
  const yr=S.year;
  let rows, filename;
  if (type==='income') {
    rows=[['Datum','Categorie','Beschrijving','Bedrag','Van IBAN','Naar IBAN','Notitie']];
    S.incomes.filter(x=>getYr(x)==yr).sort((a,b)=>a.date.localeCompare(b.date))
      .forEach(x=>rows.push([fmtD(x.date),catL(x.category,true),x.description,x.amount,x.ibanVan||'',x.ibanAan||'',x.note||'']));
    filename=`SSE_Inkomsten_${yr}.csv`;
  } else if (type==='expense') {
    rows=[['Datum','Categorie','Beschrijving','Bedrag','Van IBAN','Aan IBAN','Notitie']];
    S.expenses.filter(x=>getYr(x)==yr).sort((a,b)=>a.date.localeCompare(b.date))
      .forEach(x=>rows.push([fmtD(x.date),catL(x.category,false),x.description,x.amount,x.ibanVan||'',x.ibanAan||'',x.note||'']));
    filename=`SSE_Uitgaven_${yr}.csv`;
  } else if (type==='debt') {
    rows=[['Naam','Totaal','Betaald','Resterend','Vervaldag','Notitie']];
    S.debts.sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''))
      .forEach(d=>{const r=Math.max(0,parseFloat(d.total||0)-parseFloat(d.paid||0));
        rows.push([d.name,d.total,d.paid||0,r.toFixed(2),fmtD(d.dueDate),d.note||'']);});
    filename=`SSE_Schulden_${yr}.csv`;
  } else {
    rows=[['Type','Datum','Categorie','Beschrijving','Bedrag','Van IBAN','Aan IBAN']];
    S.incomes.filter(x=>getYr(x)==yr).forEach(x=>rows.push(['Inkomst',fmtD(x.date),catL(x.category,true),x.description,x.amount,x.ibanVan||'',x.ibanAan||'']));
    S.expenses.filter(x=>getYr(x)==yr).forEach(x=>rows.push(['Uitgave',fmtD(x.date),catL(x.category,false),x.description,x.amount,x.ibanVan||'',x.ibanAan||'']));
    filename=`SSE_${yr}.csv`;
  }
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=filename;a.click();
  toast('📊 CSV gedownload!');
};

// ── TOAST ────────────────────────────────────────────────────
function toast(msg) {
  const el=document.getElementById('toast-el');
  el.textContent=msg; el.style.display='block';
  clearTimeout(window._t); window._t=setTimeout(()=>el.style.display='none',2600);
}
