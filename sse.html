<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSE Financiën</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/themes/airbnb.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/nl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fdf6f0; --surface: #ffffff; --surface2: #fef3fb;
    --border: #f0dff5; --border2: #fde8d8;
    --text: #3d2c3e; --text2: #7a5c7e; --text3: #b89abc;
    --accent1: #c084fc; --accent2: #f9a8d4; --accent3: #fb923c;
    --cream: #fef9ee;
    --shadow: 0 2px 16px rgba(192,132,252,0.10);
    --shadow2: 0 4px 24px rgba(192,132,252,0.18);
    --radius: 14px; --radius-sm: 8px;
    --green: #22c55e; --red: #ef4444; --orange: #f97316; --blue: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 2px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 12px; height: 58px; box-shadow: var(--shadow); }
  .logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; cursor: pointer; }
  .year-select { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; border: none; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; outline: none; }
  .nav-tabs { display: flex; gap: 4px; margin-left: auto; }
  .nav-tab { padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 12px; border: 2px solid transparent; background: transparent; color: var(--text2); transition: all .15s; font-family: 'Nunito', sans-serif; }
  .nav-tab.active { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; box-shadow: 0 2px 10px rgba(192,132,252,.3); }
  .nav-tab:hover:not(.active) { background: var(--surface2); border-color: var(--border); }
  #auth-area { margin-left: 12px; }

  /* LAYOUT */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* CARD */
  .card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 20px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .card-title { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 16px; }
  .section-label { font-size: 10px; font-weight: 900; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { border-radius: var(--radius); border: 1.5px solid var(--border); padding: 18px; text-align: center; background: var(--surface); box-shadow: var(--shadow); }
  .stat-val { font-size: 26px; font-weight: 900; }
  .stat-label { font-size: 10px; font-weight: 700; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }
  .stat-card.income { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: #86efac; }
  .stat-card.expense { background: linear-gradient(135deg, #fef2f2, #fee2e2); border-color: #fca5a5; }
  .stat-card.debt { background: linear-gradient(135deg, #fff7ed, #ffedd5); border-color: #fdba74; }
  .stat-card.balance-pos { background: linear-gradient(135deg, var(--accent1), var(--accent2)); border-color: transparent; }
  .stat-card.balance-pos .stat-val, .stat-card.balance-pos .stat-label { color: #fff; }
  .stat-card.balance-neg { background: linear-gradient(135deg, #fef2f2, #fee2e2); border-color: #fca5a5; }

  /* TABLE */
  .tbl-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1.5px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; background: var(--cream); border-bottom: 1.5px solid var(--border); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf4ff; }

  /* CATEGORY BADGES */
  .cat-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .cat-baguage { background: #f0fdf4; color: #166534; }
  .cat-erasmus { background: #dbeafe; color: #1e40af; }
  .cat-lening { background: #fff7ed; color: #9a3412; }
  .cat-donatie { background: #fdf4ff; color: #7e22ce; }
  .cat-kira { background: #fef9c3; color: #854d0e; }
  .cat-bank { background: #f1f5f9; color: #475569; }
  .cat-materiaal { background: #fce7f3; color: #be185d; }
  .cat-overig { background: #f8fafc; color: #64748b; }

  /* STATUS BADGES */
  .status-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .status-betaald { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
  .status-open { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
  .status-gedeeltelijk { background: #fefce8; color: #854d0e; border: 1px solid #fde047; }

  /* AMOUNT */
  .amount-in { color: #16a34a; font-weight: 800; }
  .amount-out { color: #dc2626; font-weight: 800; }
  .amount-debt { color: #ea580c; font-weight: 800; }

  /* BUTTONS */
  .btn { padding: 7px 16px; border-radius: 20px; border: none; cursor: pointer; font-weight: 700; font-size: 12px; transition: all .15s; font-family: 'Nunito', sans-serif; }
  .btn-primary { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; box-shadow: 0 2px 10px rgba(192,132,252,.25); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(192,132,252,.4); }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: #fef2f2; color: #991b1b; border: 1.5px solid #fca5a5; }
  .btn-success { background: #f0fdf4; color: #166534; border: 1.5px solid #86efac; }
  .btn-sm { padding: 4px 10px; font-size: 10px; }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-icon { padding: 4px 8px; border-radius: 8px; font-size: 13px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(61,44,62,.45); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-box { background: var(--surface); border-radius: 20px; border: 2px solid var(--border); padding: 28px; min-width: 340px; max-width: 500px; width: 95%; box-shadow: var(--shadow2); animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .form-input, .form-select, .form-textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: 'Nunito', sans-serif; color: var(--text); background: var(--cream); outline: none; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent1); }
  .form-textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; border-radius: 12px; padding: 12px 20px; font-weight: 700; font-size: 13px; z-index: 2000; box-shadow: 0 8px 24px rgba(192,132,252,.35); animation: slideup .25s ease; }
  @keyframes slideup { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .filter-chip { padding: 4px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); font-size: 11px; font-weight: 700; color: var(--text2); cursor: pointer; transition: all .12s; font-family: 'Nunito', sans-serif; }
  .filter-chip.active { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; border-color: transparent; }
  .filter-chip:hover:not(.active) { background: var(--surface2); }

  /* DEBT PROGRESS */
  .debt-progress { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .debt-progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #86efac); border-radius: 4px; transition: width .3s; }

  /* CHART CONTAINER */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 20px; }
  .chart-box { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 18px; box-shadow: var(--shadow); }
  .chart-title { font-size: 12px; font-weight: 800; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .8px; }
  canvas { max-height: 220px; }

  /* PDF PRINT */
  @media print {
    header, .filter-bar, .btn, .nav-tabs, #auth-area { display: none !important; }
    .main { padding: 10px; }
    .card { page-break-inside: avoid; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media(max-width: 600px) { .form-row { grid-template-columns: 1fr; } .chart-grid { grid-template-columns: 1fr; } }

  /* FLATPICKR CUSTOM THEMING */
  .flatpickr-calendar {
    border-radius: 16px !important;
    border: 2px solid var(--border) !important;
    box-shadow: 0 12px 40px rgba(192,132,252,0.25) !important;
    font-family: 'Nunito', sans-serif !important;
    padding: 8px !important;
    width: 340px !important;
  }
  .flatpickr-months { padding: 8px 4px !important; }
  .flatpickr-month { background: transparent !important; }
  .flatpickr-current-month { font-size: 16px !important; font-weight: 800 !important; color: var(--text) !important; }
  .flatpickr-current-month .flatpickr-monthDropdown-months {
    background: var(--surface) !important; font-family: 'Nunito', sans-serif !important;
    font-weight: 800 !important; font-size: 16px !important; color: var(--text) !important;
  }
  .flatpickr-current-month input.cur-year {
    font-family: 'Nunito', sans-serif !important; font-weight: 800 !important;
    font-size: 16px !important; color: var(--text) !important;
  }
  .flatpickr-weekday { font-family: 'Nunito', sans-serif !important; font-weight: 800 !important; font-size: 11px !important; color: var(--text3) !important; }
  .flatpickr-day {
    font-family: 'Nunito', sans-serif !important; font-weight: 700 !important;
    border-radius: 10px !important; font-size: 13px !important;
    height: 38px !important; line-height: 38px !important;
    margin: 2px !important; width: 38px !important; max-width: 38px !important;
  }
  .flatpickr-day:hover { background: var(--surface2) !important; border-color: var(--accent1) !important; }
  .flatpickr-day.selected, .flatpickr-day.selected:hover {
    background: linear-gradient(135deg, #c084fc, #f9a8d4) !important;
    border-color: transparent !important; color: #fff !important;
    box-shadow: 0 2px 10px rgba(192,132,252,0.4) !important;
  }
  .flatpickr-day.today { border: 2px solid var(--accent1) !important; font-weight: 900 !important; }
  .flatpickr-day.today.selected { border-color: transparent !important; }
  .flatpickr-prev-month, .flatpickr-next-month { color: var(--accent1) !important; fill: var(--accent1) !important; }
  .flatpickr-prev-month:hover svg, .flatpickr-next-month:hover svg { fill: var(--accent2) !important; }
  .numInputWrapper:hover { background: transparent !important; }
  .numInputWrapper span { border-color: var(--border) !important; }
</style>
</head>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0SO2m658hN3O8p9GJodODn6kRPuu5iFQ",
  authDomain: "lesnotitie.firebaseapp.com",
  projectId: "lesnotitie",
  storageBucket: "lesnotitie.firebasestorage.app",
  messagingSenderId: "295926362823",
  appId: "1:295926362823:web:4704194a0d80544ad7c4e2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, async (user) => {
  window._currentUser = user;
  updateAuthUI(user);
  if (user) {
    await loadData(user.uid);
  }
});

window._signIn = async () => { try { await signInWithPopup(auth, provider); } catch(e) {} };
window._signOut = async () => {
  if (!confirm("Uitloggen?")) return;
  await signOut(auth);
  window._currentUser = null;
  updateAuthUI(null);
  showToast("Uitgelogd");
};

window._saveData = async function() {
  if (!window._currentUser) return;
  try {
    await setDoc(doc(db, "sse_finance", window._currentUser.uid), {
      data: JSON.stringify(window.finState),
      updatedAt: new Date().toISOString()
    });
  } catch(e) { console.warn("Save error:", e); }
};

async function loadData(uid) {
  try {
    const snap = await getDoc(doc(db, "sse_finance", uid));
    if (snap.exists()) {
      const parsed = JSON.parse(snap.data().data);
      // Replace arrays fully instead of merging
      if (parsed.incomes) window.finState.incomes = parsed.incomes;
      if (parsed.expenses) window.finState.expenses = parsed.expenses;
      if (parsed.debts) window.finState.debts = parsed.debts;
      if (parsed.years) window.finState.years = parsed.years;
      if (parsed.currentYear) window.finState.currentYear = parsed.currentYear;
      generateHuurSchulden(); // ensure auto debts still present
      populateYearSelect();
      render();
      showToast("☁️ Cloud data geladen!");
    }
  } catch(e) { console.warn("Load error:", e); }
}

function updateAuthUI(user) {
  const el = document.getElementById('auth-area');
  if (!el) return;
  if (user) {
    el.innerHTML = `<div style="display:flex;align-items:center;gap:8px">
      <img src="${user.photoURL||''}" style="width:26px;height:26px;border-radius:50%;border:2px solid var(--accent1)" onerror="this.style.display='none'">
      <span style="font-size:11px;font-weight:700;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${user.displayName||user.email}</span>
      <button class="btn btn-secondary btn-sm" onclick="window._signOut()">Uitloggen</button>
    </div>`;
  } else {
    el.innerHTML = `<button class="btn btn-primary btn-sm" onclick="window._signIn()">
      <svg width="13" height="13" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google ile giriş yap
    </button>`;
  }
}
</script>

<script>
// ===================== STATE =====================
const INCOME_CATS = [
  { id: 'erasmus', label: 'Erasmus+', icon: '🇪🇺' },
  { id: 'donatie', label: 'Donatie/Bağış', icon: '🎁' },
  { id: 'lening', label: 'Lening (borç)', icon: '🔄' },
  { id: 'lidgeld', label: 'Lidgeld', icon: '👥' },
  { id: 'subsidie', label: 'Subsidie', icon: '🏛️' },
  { id: 'overig_in', label: 'Overig', icon: '➕' },
];
const EXPENSE_CATS = [
  { id: 'kira', label: 'Huur/Kira', icon: '🏠' },
  { id: 'bank', label: 'Bankkosten', icon: '🏦' },
  { id: 'materiaal', label: 'Materiaal', icon: '📦' },
  { id: 'activiteit', label: 'Activiteit', icon: '🎯' },
  { id: 'admin', label: 'Administratie', icon: '📋' },
  { id: 'terugbetaling', label: 'Lening terugbetaling', icon: '💳' },
  { id: 'overig_uit', label: 'Overig', icon: '➖' },
];

const MONTHS = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const MONTHS_FULL = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];

window.finState = {
  currentYear: new Date().getFullYear(),
  years: [new Date().getFullYear()],
  incomes: [],   // { id, date, amount, category, description, year }
  expenses: [],  // { id, date, amount, category, description, year }
  debts: [],     // { id, name, total, paid, category, description, dueDate, year }
};

let currentView = 'overzicht';
let filterMonth = 'all';
let filterCat = 'all';

function uid() { return Math.random().toString(36).substr(2, 9); }

function saveState() {
  try {
    const json = JSON.stringify(window.finState);
    localStorage.setItem('sse_finance_v1', json);
  } catch(e) { console.warn('localStorage save failed:', e); }
  // Firebase save (async, non-blocking)
  try {
    if (window._saveData) window._saveData();
  } catch(e) { console.warn('Firebase save failed:', e); }
}

function loadLocal() {
  try {
    const saved = localStorage.getItem('sse_finance_v1');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge carefully - arrays should replace, not merge
      if (parsed.incomes) window.finState.incomes = parsed.incomes;
      if (parsed.expenses) window.finState.expenses = parsed.expenses;
      if (parsed.debts) window.finState.debts = parsed.debts;
      if (parsed.years) window.finState.years = parsed.years;
      if (parsed.currentYear) window.finState.currentYear = parsed.currentYear;
      console.log('Local loaded: incomes:', window.finState.incomes.length,
        'expenses:', window.finState.expenses.length, 'debts:', window.finState.debts.length);
    }
  } catch(e) { console.warn('loadLocal error:', e); }
}

function esc(s) {
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(n) {
  return '€ ' + parseFloat(n || 0).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T12:00:00'); // avoid timezone shift
  const day = String(dt.getDate()).padStart(2,'0');
  const month = String(dt.getMonth()+1).padStart(2,'0');
  return `${day}/${month}/${dt.getFullYear()}`;
}

// ===================== YEAR =====================
function populateYearSelect() {
  const sel = document.getElementById('year-select');
  if (!sel) return;
  const years = [...new Set([...window.finState.years, window.finState.currentYear])].sort((a,b) => b-a);
  sel.innerHTML = years.map(y => `<option value="${y}" ${y==window.finState.currentYear?'selected':''}>${y}</option>`).join('');
}

function switchYear(y) {
  window.finState.currentYear = parseInt(y);
  if (!window.finState.years.includes(parseInt(y))) window.finState.years.push(parseInt(y));
  saveState();
  render();
}

function addYear() {
  const y = parseInt(prompt('Nieuw jaar toevoegen (bijv. 2027):'));
  if (!y || isNaN(y)) return;
  if (!window.finState.years.includes(y)) window.finState.years.push(y);
  window.finState.currentYear = y;
  saveState();
  populateYearSelect();
  render();
  showToast(`✅ ${y} toegevoegd`);
}

// ===================== FILTERS =====================
function getFiltered(arr) {
  return arr.filter(x => {
    const yr = x.year || new Date(x.date).getFullYear();
    if (yr != window.finState.currentYear) return false;
    if (filterMonth !== 'all') {
      const m = new Date(x.date).getMonth();
      if (m != filterMonth) return false;
    }
    if (filterCat !== 'all' && x.category !== filterCat) return false;
    return true;
  });
}

function totalOf(arr) {
  return arr.reduce((s, x) => s + parseFloat(x.amount || 0), 0);
}

// ===================== RENDER =====================
// Destroy all Chart.js instances before re-rendering to avoid canvas reuse errors
function destroyCharts() {
  Object.values(Chart.instances || {}).forEach(c => { try { c.destroy(); } catch(e) {} });
}

function render() {
  destroyCharts();
  renderNavTabs();
  const m = document.getElementById('main-content');
  if (currentView === 'overzicht') m.innerHTML = renderOverzicht();
  else if (currentView === 'inkomsten') m.innerHTML = renderInkomsten();
  else if (currentView === 'uitgaven') m.innerHTML = renderUitgaven();
  else if (currentView === 'schulden') m.innerHTML = renderSchulden();
  else if (currentView === 'grafieken') { m.innerHTML = renderGrafieken(); setTimeout(renderCharts, 50); }
}

function renderNavTabs() {
  const views = ['overzicht','inkomsten','uitgaven','schulden','grafieken'];
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', views[i] === currentView);
  });
}

function switchView(v) {
  currentView = v;
  filterMonth = 'all';
  filterCat = 'all';
  try { localStorage.setItem('sse_view', v); } catch(e) {}
  render();
}

function quickAdd(type) {
  const yr = window.finState.currentYear;
  const addDebt = (name, total, dueDate, note) => {
    if (window.finState.debts.some(d => d.name === name)) {
      showToast('⚠️ Al aanwezig: ' + name.slice(0,30) + '...'); return;
    }
    window.finState.debts.push({ id: uid(), name, total, paid: 0, dueDate, note, year: yr });
    saveState(); switchView('schulden');
  };
  if (type === 'huur') {
    switchView('schulden');
    showToast('🏠 Huur staat al automatisch in Schulden!');
  } else if (type === 'bank') {
    addDebt('KBC Business PRO — jaarlijkse kost 2026', 51, '2026-03-05',
      'KBC bankkosten jaarlijks. Ontvangen 05/03/2026');
    showToast('🏦 KBC 51€ toegevoegd als schuld!');
  } else if (type === 'kbc178') {
    addDebt('KBC — rekening aanvraagkosten 2026', 178, '2026-01-02',
      'Eenmalige aanvraagkost KBC Business PRO bij oprichting VZW');
    showToast('💳 KBC 178€ toegevoegd als schuld!');
  } else if (type === 'fod') {
    addDebt('FOD Justitie — registratiekosten VZW', 173.76, '2026-01-02',
      'Neerlegging statuten + publicatie Belgisch Staatsblad');
    showToast('🏛️ FOD Justitie toegevoegd als schuld!');
  }
}

function renderSchulden() {
  const debts = window.finState.debts;
  const totalDebt = debts.reduce((s,d) => s + Math.max(0, parseFloat(d.total||0) - parseFloat(d.paid||0)), 0);
  const paid = debts.filter(d => parseFloat(d.paid||0) >= parseFloat(d.total||0))
    .sort((a,b) => new Date(b.dueDate||'2099') - new Date(a.dueDate||'2099'));
  const open = debts.filter(d => parseFloat(d.paid||0) < parseFloat(d.total||0))
    .sort((a,b) => new Date(b.dueDate||'2099') - new Date(a.dueDate||'2099'));

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">

function renderDebtCard(d) {
  const total = parseFloat(d.total || 0);
  const paid = parseFloat(d.paid || 0);
  const remaining = Math.max(0, total - paid);
  const pct = total > 0 ? Math.min(100, (paid/total)*100) : 0;
  const isFullyPaid = remaining <= 0;

  return `<div style="padding:14px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:10px;background:${isFullyPaid?'#f0fdf4':'#fff'}">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
      <div style="flex:1">
        <div style="font-weight:800;font-size:14px">${esc(d.name)}</div>
        ${d.note ? `<div style="font-size:11px;color:var(--text2);margin-top:2px">📝 ${esc(d.note)}</div>` : ''}
        <div style="display:flex;gap:12px;margin-top:4px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--text3)">💰 Totaal: <b>${fmt(total)}</b></span>
          <span style="font-size:10px;color:#16a34a">✅ Betaald: <b>${fmt(paid)}</b></span>
          <span style="font-size:10px;color:#ea580c">🔴 Resterend: <b>${fmt(remaining)}</b></span>
          ${d.dueDate ? `<span style="font-size:10px;color:var(--text3)">📅 Vervaldag: <b>${fmtDate(d.dueDate)}</b></span>` : ''}
        </div>
      </div>
      <div style="text-align:right;margin-left:12px">
        <div style="font-size:22px;font-weight:900;color:${isFullyPaid?'#16a34a':'#ea580c'}">${fmt(remaining)}</div>
        <div style="font-size:10px;color:var(--text3)">nog te betalen</div>
      </div>
    </div>
    <div class="debt-progress">
      <div class="debt-progress-fill" style="width:${pct}%"></div>

function renderCharts() {
  const yr = window.finState.currentYear;
  const incomes = window.finState.incomes.filter(x => (x.year||new Date(x.date).getFullYear()) == yr);
  const expenses = window.finState.expenses.filter(x => (x.year||new Date(x.date).getFullYear()) == yr);

  // Income by category
  const incByCat = {};
  INCOME_CATS.forEach(c => incByCat[c.id] = 0);
  incomes.forEach(x => { incByCat[x.category] = (incByCat[x.category]||0) + parseFloat(x.amount||0); });
  const incCatData = INCOME_CATS.filter(c => incByCat[c.id] > 0);

  new Chart(document.getElementById('chart-income-cat'), {
    type: 'doughnut',
    data: {
      labels: incCatData.map(c => c.icon + ' ' + c.label),
      datasets: [{ data: incCatData.map(c => incByCat[c.id]),
        backgroundColor: ['#86efac','#93c5fd','#fde68a','#c4b5fd','#fed7aa','#a5f3fc'],
        borderWidth: 2, borderColor: '#fff' }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { family: 'Nunito', size: 11 } } } }, responsive: true, maintainAspectRatio: true }
  });

  // Expense by category
  const expByCat = {};
  EXPENSE_CATS.forEach(c => expByCat[c.id] = 0);
  expenses.forEach(x => { expByCat[x.category] = (expByCat[x.category]||0) + parseFloat(x.amount||0); });
  const expCatData = EXPENSE_CATS.filter(c => expByCat[c.id] > 0);

  new Chart(document.getElementById('chart-expense-cat'), {
    type: 'doughnut',
    data: {
      labels: expCatData.map(c => c.icon + ' ' + c.label),
      datasets: [{ data: expCatData.map(c => expByCat[c.id]),
        backgroundColor: ['#fca5a5','#fdba74','#fde047','#f9a8d4','#a5b4fc','#6ee7b7'],
        borderWidth: 2, borderColor: '#fff' }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { font: { family: 'Nunito', size: 11 } } } }, responsive: true, maintainAspectRatio: true }
  });

  // Monthly bar
  const monthIn = MONTHS.map((_,i) => incomes.filter(x => new Date(x.date).getMonth()===i).reduce((s,x)=>s+parseFloat(x.amount||0),0));
  const monthOut = MONTHS.map((_,i) => expenses.filter(x => new Date(x.date).getMonth()===i).reduce((s,x)=>s+parseFloat(x.amount||0),0));

  new Chart(document.getElementById('chart-monthly'), {
    type: 'bar',
    data: {
      labels: MONTHS_FULL.map(m => m.slice(0,3)),
      datasets: [
        { label: 'Inkomsten', data: monthIn, backgroundColor: '#86efac', borderRadius: 6 },
        { label: 'Uitgaven', data: monthOut, backgroundColor: '#fca5a5', borderRadius: 6 }
      ]
    },
    options: { plugins: { legend: { labels: { font: { family: 'Nunito' } } } }, responsive: true, maintainAspectRatio: true, scales: { x: { grid: { display: false } } } }
  });

  // Cumulative
  let cumulative = 0;
  const cumulData = MONTHS.map((_,i) => {
    cumulative += monthIn[i] - monthOut[i];
    return cumulative;
  });

  new Chart(document.getElementById('chart-cumulative'), {
    type: 'line',
    data: {
      labels: MONTHS_FULL.map(m => m.slice(0,3)),
      datasets: [{ label: 'Cumulatief saldo', data: cumulData,
        borderColor: '#c084fc', backgroundColor: 'rgba(192,132,252,0.1)',
        fill: true, tension: 0.4, pointBackgroundColor: '#c084fc', pointRadius: 4 }]
    },
    options: {
      plugins: { legend: { labels: { font: { family: 'Nunito' } } } },
      responsive: true, maintainAspectRatio: true,
      scales: {
        y: { grid: { color: '#f0dff5' } },
        x: { grid: { display: false } }
      }
    }
  });
}

      <input class="form-input" type="date" id="m-date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-success" onclick="doPayDebt('${id}')">✅ Betaling registreren</button>
    </div>`);
}

function doPayDebt(id) {
  const amount = parseFloat(document.getElementById('m-pay').value) || 0;
  const date = getDateVal('m-date');
  if (amount <= 0) return;
  const idx = window.finState.debts.findIndex(x => x.id === id);
  if (idx < 0) return;
  window.finState.debts[idx].paid = (parseFloat(window.finState.debts[idx].paid||0) + amount);
  // Also add as expense
  window.finState.expenses.push({ id: uid(), date, amount, category: 'terugbetaling', description: 'Betaling: ' + window.finState.debts[idx].name, year: window.finState.currentYear });
  saveState(); closeModal(); render(); showToast(`✅ ${fmt(amount)} betaling geregistreerd!`);
}

function modalEditDebt(id) {
  const d = window.finState.debts.find(x => x.id === id);
  if (!d) return;
  openModal(`<div class="modal-title">✏️ Schuld bewerken</div>
    <div class="form-group"><label class="form-label">Naam</label><input class="form-input" id="m-name" value="${esc(d.name)}" autofocus></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Totaal (€)</label><input class="form-input" type="number" id="m-total" value="${d.total}" min="0" step="0.01"></div>
      <div class="form-group"><label class="form-label">Al betaald (€)</label><input class="form-input" type="number" id="m-paid" value="${d.paid||0}" min="0" step="0.01"></div>
    </div>
    <div class="form-group"><label class="form-label">Vervaldatum</label><input class="form-input" type="date" id="m-due" value="${d.dueDate||''}"></div>
    <div class="form-group"><label class="form-label">Notitie</label><textarea class="form-textarea" id="m-note">${esc(d.note||'')}</textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-danger" onclick="deleteDebt('${id}');closeModal()">🗑</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="doEditDebt('${id}')">Opslaan</button>
    </div>`);
}

function doEditDebt(id) {
  const idx = window.finState.debts.findIndex(x => x.id === id);
  if (idx < 0) return;
  window.finState.debts[idx] = { ...window.finState.debts[idx],
    name: document.getElementById('m-name').value.trim(),
    total: parseFloat(document.getElementById('m-total').value) || 0,
    paid: parseFloat(document.getElementById('m-paid').value) || 0,
    dueDate: getDateVal('m-due'),
    note: document.getElementById('m-note').value.trim()
  };
  saveState(); closeModal(); render(); showToast("✅ Bijgewerkt!");
}

function deleteDebt(id) {
  window.finState.debts = window.finState.debts.filter(x => x.id !== id);
  saveState(); render(); showToast("🗑 Verwijderd");
}

function exportPDF() { window.print(); }

function exportCSV() {
  const yr = window.finState.currentYear;
  const rows = [['Type','Datum','Categorie','Beschrijving','Bedrag']];
  window.finState.incomes.filter(x=>(x.year||new Date(x.date).getFullYear())==yr)
    .forEach(x => rows.push(['Inkomst', x.date, getCatLabel(x.category,true), x.description, x.amount]));
  window.finState.expenses.filter(x=>(x.year||new Date(x.date).getFullYear())==yr)
    .forEach(x => rows.push(['Uitgave', x.date, getCatLabel(x.category,false), x.description, '-'+x.amount]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `SSE_financien_${yr}.csv`; a.click();
  showToast("📊 CSV gedownload!");
}

// ===================== DATE PICKERS =====================
function initDatePickers() {
  document.querySelectorAll('input[type="date"]').forEach(el => {
    if (el._flatpickr) el._flatpickr.destroy();
    // Convert existing YYYY-MM-DD value to show DD/MM/YYYY
    const existingVal = el.value;
    flatpickr(el, {
      locale: "nl",
      dateFormat: "d/m/Y",        // display to user: 11/03/2026
      altInput: false,
      allowInput: true,
      disableMobile: true,
      monthSelectorType: "dropdown",
      defaultDate: existingVal || null,
      onReady(_, __, fp) {
        if (fp.calendarContainer) fp.calendarContainer.style.zIndex = '9999';
      },
      onChange(selectedDates, dateStr, fp) {
        // Store YYYY-MM-DD in a hidden sibling for JS to read
        const hidden = fp.element.nextElementSibling;
        if (hidden && hidden.classList.contains('fp-hidden-date')) {
          hidden.value = selectedDates[0] ? selectedDates[0].toISOString().slice(0,10) : '';
        }
      }
    });
    // Add hidden input after date field to store ISO value
    if (!el.nextElementSibling || !el.nextElementSibling.classList.contains('fp-hidden-date')) {
      const hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.className = 'fp-hidden-date';
      hidden.value = existingVal || '';
      el.parentNode.insertBefore(hidden, el.nextSibling);
    }
  });
}

// Helper: get date value from flatpickr input (returns YYYY-MM-DD)
function getDateVal(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  // Try flatpickr instance directly
  if (el._flatpickr && el._flatpickr.selectedDates.length > 0) {
    const d = el._flatpickr.selectedDates[0];
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + day;
  }
  // Try hidden sibling
  const hidden = el.nextElementSibling;
  if (hidden && hidden.classList.contains('fp-hidden-date') && hidden.value) return hidden.value;
  // Fallback: parse value directly
  const v = el.value;
  if (!v) return '';
  // Already ISO?
  if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  // DD/MM/YYYY?
  const parts = v.split('/');
  if (parts.length === 3 && parts[2].length === 4) {
    return parts[2] + '-' + parts[1].padStart(2,'0') + '-' + parts[0].padStart(2,'0');
  }
  return v;
}

// ===================== AUTO HUUR SCHULDEN =====================
function generateHuurSchulden() {
  const now = new Date();
  const startYear = 2026;
  const MAANDEN_NL = ['Januari','Februari','Maart','April','Mei','Juni',
                       'Juli','Augustus','September','Oktober','November','December'];
  let generated = 0;

  // Monthly huur
  for (let y = startYear; y <= now.getFullYear(); y++) {
    const mStart = 0;
    const mEnd = (y === now.getFullYear()) ? now.getMonth() : 11;
    for (let m = mStart; m <= mEnd; m++) {
      const maandNaam = MAANDEN_NL[m] + ' ' + y;
      const debtName = 'Mustafa Turk - Huur ' + maandNaam;
      if (!window.finState.debts.some(d => d.name === debtName)) {
        const dueDay = String(y) + '-' + String(m+1).padStart(2,'0') + '-02';
        window.finState.debts.push({
          id: uid(), name: debtName, total: 500, paid: 0,
          dueDate: dueDay,
          note: 'Automatisch — maandelijkse huur Zavelputstraat 18',
          year: y
        });
        generated++;
      }
    }
  }

  // One-time vaste schulden (if not already present)
  const vaste = [
    { name: 'KBC Business PRO — jaarlijkse kost 2026', total: 51, dueDate: '2026-03-05',
      note: 'KBC bankkosten jaarlijks. Vervaldag 05/03/2026. Van: BE10 7350 7584 5904 → Naar: BE68 7390 3074 2634 (dernek)', year: 2026 },
    { name: 'FOD Justitie — registratiekosten VZW', total: 173.76, dueDate: '2026-01-02',
      note: 'Neerlegging statuten + publicatie Belgisch Staatsblad. Registratie Smart Skills Education VZW', year: 2026 },
  ];
  vaste.forEach(v => {
    if (!window.finState.debts.some(d => d.name === v.name)) {
      window.finState.debts.push({ id: uid(), paid: 0, ...v });
      generated++;
    }
  });

  if (generated > 0) {
    saveState();
  }
}
