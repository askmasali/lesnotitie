<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LesNotitie — Leerplan 2024</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #fdf6f0;
    --surface:   #ffffff;
    --surface2:  #fef3fb;
    --border:    #f0dff5;
    --border2:   #fde8d8;
    --text:      #3d2c3e;
    --text2:     #7a5c7e;
    --text3:     #b89abc;
    --text4:     #d4b8da;
    --accent1:   #c084fc; /* lavender purple */
    --accent2:   #f9a8d4; /* pink */
    --accent3:   #fb923c; /* orange */
    --accent4:   #fbbf24; /* amber */
    --accent5:   #a3e635; /* lime */
    --cream:     #fef9ee;
    --shadow:    0 2px 16px rgba(192,132,252,0.10);
    --shadow2:   0 4px 24px rgba(192,132,252,0.18);
    --radius:    14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* THEME PICKER */
  .theme-bar { display:flex; align-items:center; gap:8px; padding:10px 20px; background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .theme-label { font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
  .theme-swatch { width:22px; height:22px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all .15s; }
  .theme-swatch.active { border-color: var(--text); transform:scale(1.2); }
  .custom-colors { display:flex; align-items:center; gap:6px; margin-left:8px; }
  .color-pick-wrap { display:flex; align-items:center; gap:4px; }
  .color-pick-wrap label { font-size:10px; color:var(--text2); font-weight:600; }
  .color-pick-wrap input[type=color] { width:28px; height:22px; border:1px solid var(--border); border-radius:4px; cursor:pointer; padding:1px; background:none; }

  /* HEADER */
  header { background: var(--surface); border-bottom:2px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:12px; height:58px; flex-shrink:0; box-shadow: var(--shadow); }
  .logo { font-family:'Playfair Display', serif; font-size:20px; font-weight:700; background: linear-gradient(135deg, var(--accent1), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .year-badge { background: linear-gradient(135deg, var(--accent1) 0%, var(--accent2) 100%); color:#fff; padding:3px 12px; border-radius:20px; font-size:11px; font-weight:800; letter-spacing:.5px; }
  .nav-tabs { display:flex; gap:4px; margin-left:auto; }
  .nav-tab { padding:6px 16px; border-radius:20px; cursor:pointer; font-weight:700; font-size:12px; border:2px solid transparent; background:transparent; color:var(--text2); transition:all .15s; font-family:'Nunito',sans-serif; }
  .nav-tab.active { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color:#fff; border-color:transparent; box-shadow:0 2px 10px rgba(192,132,252,.3); }
  .nav-tab:hover:not(.active) { background:var(--surface2); border-color:var(--border); }

  /* LAYOUT */
  .app-body { display:flex; height: calc(100vh - 102px); }
  .sidebar { width:200px; background:var(--surface); border-right:2px solid var(--border); overflow-y:auto; flex-shrink:0; padding:12px 0; }
  .side-section { padding:10px 14px 4px; font-size:9px; font-weight:900; letter-spacing:2px; color:var(--text3); text-transform:uppercase; }
  .side-item { padding:8px 14px; cursor:pointer; font-size:12px; font-weight:600; color:var(--text2); border-left:3px solid transparent; transition:all .12s; display:flex; justify-content:space-between; align-items:center; }
  .side-item:hover { background:var(--surface2); color:var(--text); }
  .side-item.active { background: linear-gradient(90deg, #f5e6ff, #fff0fa); color:var(--accent1); border-left:3px solid var(--accent1); font-weight:800; }
  .side-item.holiday { color:var(--accent3); }
  .side-item.holiday.active { color:var(--accent3); border-left-color:var(--accent3); background:linear-gradient(90deg,#fff3e8,#fff8f0); }

  /* MAIN */
  .main { flex:1; overflow-y:auto; padding:20px; }

  /* CARDS */
  .card { background:var(--surface); border-radius:var(--radius); border:1.5px solid var(--border); padding:18px; margin-bottom:16px; box-shadow:var(--shadow); }
  .section-title { font-size:10px; font-weight:900; color:var(--text3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:14px; }

  /* TABLE */
  .tbl-wrap { overflow-x:auto; border-radius:var(--radius-sm); border:1.5px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { padding:10px 12px; text-align:left; font-size:10px; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; background:var(--cream); border-bottom:1.5px solid var(--border); white-space:nowrap; }
  td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fdf4ff !important; }
  tr.row-vacation td { background:#f0fdf4 !important; }

  /* STUDENT LINK */
  .student-link { color:var(--accent1); font-weight:800; cursor:pointer; text-decoration:none; border-bottom:2px solid transparent; transition:all .1s; }
  .student-link:hover { border-bottom-color:var(--accent1); }

  /* BUTTONS RATING */
  .rating-group { display:flex; flex-direction:column; gap:2px; }
  .r-btn { padding:2px 8px; border-radius:5px; border:1.5px solid var(--border); background:var(--surface); color:var(--text3); cursor:pointer; font-size:10px; font-weight:700; transition:all .1s; white-space:nowrap; font-family:'Nunito',sans-serif; text-align:left; width:100%; }
  .r-btn:hover { border-color:var(--accent1); color:var(--accent1); }
  .r-btn.sel-Uitstekend { background:#f0fdf4; border-color:#86efac; color:#166534; }
  .r-btn.sel-Goed { background:#eff6ff; border-color:#93c5fd; color:#1e40af; }
  .r-btn.sel-Voldoende { background:#fefce8; border-color:#fde047; color:#854d0e; }
  .r-btn.sel-Onvoldoende { background:#fff7ed; border-color:#fdba74; color:#9a3412; }
  .r-btn.sel-Slecht { background:#fef2f2; border-color:#fca5a5; color:#991b1b; }

  /* BOOL BUTTONS */
  .bool-group { display:flex; flex-direction:column; gap:3px; }
  .bool-btn { padding:3px 10px; border-radius:6px; border:1.5px solid var(--border); background:var(--surface); color:var(--text3); cursor:pointer; font-size:11px; font-weight:700; transition:all .1s; font-family:'Nunito',sans-serif; text-align:center; }
  .bool-btn.sel-yes { background:#f0fdf4; border-color:#86efac; color:#166534; }
  .bool-btn.sel-no  { background:#fef2f2; border-color:#fca5a5; color:#991b1b; }

  /* AANWEZIG */
  .aanw-group { display:flex; flex-direction:column; gap:2px; }
  .aanw-btn { padding:2px 8px; border-radius:5px; border:1.5px solid var(--border); background:var(--surface); color:var(--text3); cursor:pointer; font-size:10px; font-weight:700; transition:all .1s; font-family:'Nunito',sans-serif; text-align:left; }
  .aanw-btn.sel-Aanwezig { background:#f0fdf4; border-color:#86efac; color:#166534; }
  .aanw-btn.sel-Afwezig  { background:#fef2f2; border-color:#fca5a5; color:#991b1b; }
  .aanw-btn.sel-Te-laat  { background:#fefce8; border-color:#fde047; color:#854d0e; }

  /* NUMBER INPUT */
  .num-inp { width:60px; border:1.5px solid var(--border); border-radius:6px; padding:4px 8px; font-size:12px; font-family:'Nunito',sans-serif; color:var(--text); background:var(--cream); outline:none; }
  .num-inp:focus { border-color:var(--accent1); }

  /* NOTE INPUT */
  .note-inp { width:160px; border:1.5px solid var(--border); border-radius:6px; padding:4px 8px; font-size:11px; font-family:'Nunito',sans-serif; color:var(--text); background:var(--cream); outline:none; }
  .note-inp:focus { border-color:var(--accent2); }

  /* BUTTONS */
  .btn { padding:7px 16px; border-radius:20px; border:none; cursor:pointer; font-weight:700; font-size:12px; transition:all .15s; font-family:'Nunito',sans-serif; }
  .btn-primary { background:linear-gradient(135deg,var(--accent1),var(--accent2)); color:#fff; box-shadow:0 2px 10px rgba(192,132,252,.25); }
  .btn-primary:hover { box-shadow:0 4px 16px rgba(192,132,252,.4); transform:translateY(-1px); }
  .btn-secondary { background:var(--surface2); color:var(--text2); border:1.5px solid var(--border); }
  .btn-secondary:hover { background:var(--border); }
  .btn-danger { background:#fef2f2; color:#991b1b; border:1.5px solid #fca5a5; }
  .btn-danger:hover { background:#fee2e2; }
  .btn-ghost { background:transparent; color:var(--text2); }
  .btn-sm { padding:4px 10px; font-size:10px; }
  .btn-icon { padding:4px 8px; border-radius:8px; font-size:13px; }

  /* BADGE */
  .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:10px; font-weight:700; }
  .badge-purple { background:#f5e6ff; color:#7c3aed; }
  .badge-pink   { background:#fce7f3; color:#be185d; }
  .badge-orange { background:#ffedd5; color:#c2410c; }
  .badge-green  { background:#f0fdf4; color:#166534; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(61,44,62,.45); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:1000; }
  .modal-box { background:var(--surface); border-radius:20px; border:2px solid var(--border); padding:28px; min-width:320px; max-width:460px; width:90%; box-shadow:var(--shadow2); animation:pop .2s ease; transition: max-width .15s, width .15s; max-height:88vh; overflow-y:auto; overflow-x:hidden; }
  @keyframes pop { from { transform:scale(.9); opacity:0; } to { transform:scale(1); opacity:1; } }
  .modal-title { font-size:17px; font-weight:800; margin-bottom:20px; color:var(--text); }
  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:11px; font-weight:700; color:var(--text2); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
  .form-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px; font-family:'Nunito',sans-serif; color:var(--text); background:var(--cream); outline:none; }
  .form-input:focus { border-color:var(--accent1); }
  .form-select { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px; font-family:'Nunito',sans-serif; color:var(--text); background:var(--cream); outline:none; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; right:24px; background:linear-gradient(135deg,var(--accent1),var(--accent2)); color:#fff; border-radius:12px; padding:12px 20px; font-weight:700; font-size:13px; z-index:2000; box-shadow:0 8px 24px rgba(192,132,252,.35); animation:slideup .25s ease; }
  @keyframes slideup { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }

  /* HOLIDAY SCREEN */
  .holiday-screen { text-align:center; padding:60px 20px; }
  .holiday-emoji { font-size:64px; margin-bottom:16px; display:block; }
  .holiday-name { font-family:'Playfair Display',serif; font-size:28px; color:var(--accent3); margin-bottom:8px; }

  /* STUDENT PROFILE */
  .profile-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
  .week-card { background:var(--surface); border-radius:var(--radius); border:1.5px solid var(--border); padding:14px; transition:all .15s; }
  .week-card:hover { border-color:var(--accent1); box-shadow:var(--shadow2); }
  .week-card.empty { opacity:.45; }
  .cat-chip { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:700; margin:2px; }
  .chip-green { background:#f0fdf4; color:#166534; border:1px solid #86efac; }
  .chip-blue  { background:#eff6ff; color:#1e40af; border:1px solid #93c5fd; }
  .chip-yellow{ background:#fefce8; color:#854d0e; border:1px solid #fde047; }
  .chip-orange{ background:#fff7ed; color:#9a3412; border:1px solid #fdba74; }
  .chip-red   { background:#fef2f2; color:#991b1b; border:1px solid #fca5a5; }
  .chip-gray  { background:#f8fafc; color:#64748b; border:1px solid #e2e8f0; }

  /* SETTINGS */
  .student-chip { display:inline-flex; align-items:center; gap:5px; background:var(--surface2); border:1.5px solid var(--border); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:600; color:var(--text); margin:3px; }
  .student-chip span { cursor:pointer; color:var(--text3); font-size:11px; }
  .student-chip span:hover { color:var(--accent1); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* CLASS BLOCK */
  .class-block { background:var(--cream); border-radius:10px; border:1.5px solid var(--border2); padding:14px; margin-bottom:12px; }
  .class-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px; }

  /* GROUP HEADER */
  .group-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .group-title { font-weight:900; font-size:15px; color:var(--accent1); }

  /* DRAG VISUAL */
  .week-number { font-size:11px; font-weight:700; color:var(--text3); }

  /* RESPONSIVE */
  @media(max-width:600px) {
    .sidebar { width:150px; }
    .main { padding:12px; }
    header { padding:0 12px; height:52px; }
    .logo { font-size:16px; }
  }
</style>
</head>

  <div class="theme-swatch active" style="background:linear-gradient(135deg,#c084fc,#f9a8d4)" title="Lavender" onclick="applyTheme('lavender')"></div>

</div>

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let unsubscribeSnapshot = null;

// Expose to global scope for non-module script
window._firebase = { db, auth, provider, signInWithPopup, signOut, onAuthStateChanged, doc, setDoc, getDoc };

// Auth state listener
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  window._currentUser = user;
  if (user) {
    updateAuthUI(user);
    await loadFromFirebase(user.uid);
  } else {
    updateAuthUI(null);
    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
  }
});

window._saveThemeToFirebase = async function(themeData) {
  if (!window._currentUser) return;
  try {
    await setDoc(doc(db, "users", window._currentUser.uid), {
      theme: JSON.stringify(themeData),
      updatedAt: new Date().toISOString(),
    }, { merge: true });
  } catch(e) {}
};

async function loadFromFirebase(uid) {
  try {
    const metaSnap = await getDoc(doc(db, "users", uid));
    if (metaSnap.exists()) {
      const meta = metaSnap.data();
      // Load and apply saved theme
      if (meta.theme) {
        try {
          const t = JSON.parse(meta.theme);
          localStorage.setItem(THEME_KEY, meta.theme);
          if (t.theme) applyTheme(t.theme, false);
          if (t.custom) Object.entries(t.custom).forEach(([k,v])=>document.documentElement.style.setProperty(`--${k}`,v));
        } catch(e) {}
      }
      // Load uurrooster from Firebase (overrides localStorage)
      if (meta.uurrooster) {
        try {
          const ur = JSON.parse(meta.uurrooster);
          window._uurrooster = ur;
          localStorage.setItem('uurrooster_v1', meta.uurrooster);
        } catch(e) {}
      }
      // Load list of years
      window.state.availableYears = meta.availableYears || [window.state.schoolYear];
      // Load active year data
      const yearKey = meta.activeYear || window.state.schoolYear;
      await loadYearFromFirebase(uid, yearKey);
    } else {
      // First time - save current year
      window.state.availableYears = [window.state.schoolYear];
      await saveYearToFirebase(uid, window.state.schoolYear);
    }
  } catch(e) { console.warn("Firebase load error:", e); }
}

async function loadYearFromFirebase(uid, yearKey) {
  try {
    const snap = await getDoc(doc(db, "users", uid, "years", yearKey));
    if (snap.exists()) {
      const data = snap.data();
      if (data.yearState) {
        const parsed = JSON.parse(data.yearState);
        if (!parsed.startDate) parsed.startDate = "2025-09-01";
        if (!parsed.weeks || parsed.weeks.length === 0) parsed.weeks = window.generateWeeks(parsed.startDate);
        else {
          const base = new Date(parsed.startDate);
          const day = base.getDay(); const diff = day===0?-6:1-day; base.setDate(base.getDate()+diff);
          parsed.weeks = parsed.weeks.map((w,i)=>{ const ws=new Date(base); ws.setDate(base.getDate()+i*7); const we=new Date(ws); we.setDate(ws.getDate()+6); return{...w,dateStr:window.formatDateRange(ws,we)}; });
        }
        // Merge into state
        window.state.schoolYear = yearKey;
        window.state.startDate = parsed.startDate;
        window.state.groups = parsed.groups || [];
        window.state.evaluations = parsed.evaluations || {};
        window.state.categories = parsed.categories || window.state.categories;
        window.state.weeks = parsed.weeks;
        window.state.selectedWeek = parsed.selectedWeek || window.state.weeks[0]?.id;
        window.state.selectedGroup = parsed.selectedGroup || null;
        // Restore saved view, but not student-profile (needs selectedStudent object)
        window.state.view = (parsed.view && parsed.view !== 'student-profile') ? parsed.view : 'week';
        window.state.selectedStudent = null;
        const badge = document.getElementById('year-badge');
        if (badge) badge.textContent = yearKey + ' ▾';
        window._appRender();
        showToast("☁️ " + yearKey + " yüklendi!");
      }
    } else {
      // New year - empty
      window.state.schoolYear = yearKey;
      window.state.groups = [];
      window.state.evaluations = {};
      window.state.weeks = window.generateWeeks(window.state.startDate);
      window.state.selectedWeek = window.state.weeks[0]?.id;
      // New year — always start on week view
      window.state.view = "week";
      const badge2 = document.getElementById('year-badge');
      if (badge2) badge2.textContent = yearKey + ' ▾';
      window._appRender();
      showToast("☁️ Nieuw schooljaar: " + yearKey);
    }
  } catch(e) { console.warn("Firebase year load error:", e); }
}

async function saveYearToFirebase(uid, yearKey, yearData) {
  if (!uid) return;
  try {
    const toSave = yearData || {
      startDate: window.state.startDate,
      selectedWeek: window.state.selectedWeek,
      selectedGroup: window.state.selectedGroup,
      groups: window.state.groups,
      evaluations: window.state.evaluations,
      categories: window.state.categories,
      weeks: window.state.weeks,
    };
    await setDoc(doc(db, "users", uid, "years", yearKey), {
      yearState: JSON.stringify(toSave),
      updatedAt: new Date().toISOString(),
    });
    // Update meta
    const years = window.state.availableYears || [yearKey];
    if (!years.includes(yearKey)) years.push(yearKey);
    await setDoc(doc(db, "users", uid), {
      availableYears: years,
      activeYear: yearKey,
      email: window._currentUser?.email || "",
      updatedAt: new Date().toISOString(),
    });
  } catch(e) { console.warn("Firebase year save error:", e); }
}

window._saveToFirebase = async function(stateData) {
  if (!window._currentUser) return;
  await saveYearToFirebase(window._currentUser.uid, window.state.schoolYear, stateData);
};

window._switchYear = async function(yearKey) {
  if (!window._currentUser) { showToast("⚠️ Eerst inloggen!"); return; }
  // Save current year first
  await saveYearToFirebase(window._currentUser.uid, window.state.schoolYear);
  // Switch active year
  await setDoc(doc(db, "users", window._currentUser.uid), {
    availableYears: window.state.availableYears || [yearKey],
    activeYear: yearKey,
    email: window._currentUser.email,
    updatedAt: new Date().toISOString(),
  });
  await loadYearFromFirebase(window._currentUser.uid, yearKey);
};

window._deleteYear = async function(yearKey) {
  if (!window._currentUser) return;
  try {
    await deleteDoc(doc(db, "users", window._currentUser.uid, "years", yearKey));
    window.state.availableYears = (window.state.availableYears||[]).filter(y=>y!==yearKey);
    await setDoc(doc(db, "users", window._currentUser.uid), {
      availableYears: window.state.availableYears,
      activeYear: window.state.schoolYear,
      email: window._currentUser.email,
      updatedAt: new Date().toISOString(),
    });
    showToast(`🗑 ${yearKey} verwijderd`);
    window._appRender();
  } catch(e) { console.warn("Delete year error:", e); showToast("Fout bij verwijderen"); }
};

window._addYear = async function(yearKey, copyStudents) {
  if (!window._currentUser) { showToast("⚠️ Eerst inloggen!"); return; }
  if (!yearKey) return;
  if (!window.state.availableYears) window.state.availableYears = [];
  if (window.state.availableYears.includes(yearKey)) { showToast("Dit jaar bestaat al!"); return; }
  // Save current year
  await saveYearToFirebase(window._currentUser.uid, window.state.schoolYear);
  // Copy students if requested
  const newGroups = copyStudents ? JSON.parse(JSON.stringify(window.state.groups.map(g=>({
    ...g, classes: g.classes.map(c=>({...c, students: c.students.map(s=>({...s}))}))
  })))) : [];
  // Copy categories from current year
  const newCategories = JSON.parse(JSON.stringify(window.state.categories));
  // Copy weeks structure (labels + holidays) but recalc dates for new year
  const newStartDate = yearKey.split('-')[0] + "-09-01";
  const newWeeksBase = JSON.parse(JSON.stringify(window.state.weeks.map(w=>({
    id: w.id, number: w.number, label: w.label, isHoliday: w.isHoliday, holidayName: w.holidayName, dateStr: ""
  }))));
  // Recalc dates for new start date
  const base = new Date(newStartDate);
  const day = base.getDay(); const diff = day===0?-6:1-day; base.setDate(base.getDate()+diff);
  const newWeeks = newWeeksBase.map((w,i)=>{
    const ws = new Date(base); ws.setDate(base.getDate()+i*7);
    const we = new Date(ws); we.setDate(ws.getDate()+6);
    return { ...w, dateStr: window.formatDateRange(ws, we) };
  });
  const newYearData = {
    startDate: newStartDate,
    selectedWeek: newWeeks[0]?.id || "w1",
    selectedGroup: null,
    groups: newGroups,
    evaluations: {},
    categories: newCategories,
    weeks: newWeeks,
  };
  window.state.availableYears.push(yearKey);
  await saveYearToFirebase(window._currentUser.uid, yearKey, newYearData);
  await loadYearFromFirebase(window._currentUser.uid, yearKey);
};

window._signIn = async function() {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) { console.warn("Sign in error:", e); }
};

window._signOut = async function() {
  if (!confirm("Uitloggen? Je gegevens blijven bewaard in de cloud.")) return;
  await signOut(auth);
  window._currentUser = null;
  updateAuthUI(null);
  showToast("Uitgelogd");
};

function updateAuthUI(user) {
  const el = document.getElementById('auth-area');
  if (!el) return;
  if (user) {
    el.innerHTML = `<div style="display:flex;align-items:center;gap:8px">
      <img src="${user.photoURL||''}" style="width:26px;height:26px;border-radius:50%;border:2px solid var(--accent1)" onerror="this.style.display='none'">
      <span style="font-size:11px;font-weight:700;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${user.displayName||user.email}</span>
      <button class="btn btn-secondary btn-sm" onclick="window._signOut()">Uitloggen</button>
    </div>`;
  } else {
    el.innerHTML = `<button class="btn btn-primary btn-sm" onclick="window._signIn()" style="display:flex;align-items:center;gap:6px">
      <svg width="14" height="14" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google ile giriş yap
    </button>`;
  }
}

function showToast(msg) {
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg; t.style.display='block';
  clearTimeout(window._toastT2);
  window._toastT2=setTimeout(()=>t.style.display='none',2500);
}
</script>

function getJaarplanWeek(classJaar, weekIdx) {
  if (!classJaar || !JAARPLAN[classJaar]) return null;
  const plan = JAARPLAN[classJaar];
  // weekIdx is 0-based index in state.weeks → week number = weekIdx+1
  const weekNum = weekIdx + 1;
  // Find entry matching this week number
  const e = plan.find(x => x.wn === weekNum) || plan[weekIdx];
  if (!e) return null;
  return {
    week_num: e.wn ?? weekNum,
    month: e.mn ?? '',
    thema: e.thema,
    les: e.les,
    is_vacation: e.vac ?? false,
    is_skip: false,
    les_num: e.ln ?? 0
  };
}

// Get current school week index
function getCurrentWeekIdx() {
  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(state.startDate);
  const d = base.getDay(); base.setDate(base.getDate()+(d===0?-6:1-d));
  let found = -1;
  state.weeks.forEach((w,i) => {
    const ws = new Date(base); ws.setDate(base.getDate()+i*7); ws.setHours(0,0,0,0);
    const we = new Date(ws); we.setDate(ws.getDate()+6); we.setHours(23,59,59,0);
    if (today >= ws && today <= we) found = i;
  });
  return found;
}

// Get week index for a given week id
function getWeekIdx(wId) {
  return state.weeks.findIndex(w => w.id === wId);
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (!parsed.startDate) parsed.startDate = "2025-09-01";
      if (!parsed.weeks || parsed.weeks.length === 0) {
        parsed.weeks = generateWeeks(parsed.startDate);
      } else {
        // recalc dates in case startDate changed
        const base = new Date(parsed.startDate);
        const day = base.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        base.setDate(base.getDate() + diff);
        parsed.weeks = parsed.weeks.map((w,i) => {
          const ws = new Date(base); ws.setDate(base.getDate() + i*7);
          const we = new Date(ws); we.setDate(ws.getDate() + 6);
          return { ...w, dateStr: formatDateRange(ws, we) };
        });
      }
      // Keep saved view, but student-profile needs selectedStudent so fall back to week
      if(parsed.view === "student-profile") parsed.view = "week";
      // else keep whatever view was last open
      parsed.selectedStudent = null;
      return parsed;
    }
  } catch(e) { console.warn("Laden mislukt:", e); }
  return {...DEFAULT_STATE, weeks: generateWeeks(DEFAULT_STATE.startDate)};
}

function saveState() {
  try {
    const toSave = {
      schoolYear: state.schoolYear,
      startDate: state.startDate,
      selectedWeek: state.selectedWeek,
      selectedGroup: state.selectedGroup,
      groups: state.groups,
      evaluations: state.evaluations,
      categories: state.categories,
      weeks: state.weeks,
      view: state.view,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    // Also save to Firebase if logged in
    if (window._saveToFirebase) window._saveToFirebase(toSave);
  } catch(e) { console.warn("Opslaan mislukt:", e); }
}

function generateWeeks(startDate) {
  const holidays = { 9:"Herfstvakantie",17:"Kerstvakantie",18:"Kerstvakantie",25:"Krokusvakantie",32:"Paasvakantie",33:"Paasvakantie",44:"Zomervakantie" };
  // Find the Monday of the week containing startDate
  const base = startDate ? new Date(startDate) : new Date("2025-09-01");
  const day = base.getDay(); // 0=Sun, 1=Mon...
  const diff = day === 0 ? -6 : 1 - day; // go back to Monday
  base.setDate(base.getDate() + diff);

  return Array.from({length:44},(_,i)=>{
    const n = i+1;
    const weekStart = new Date(base);
    weekStart.setDate(base.getDate() + i*7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    const dateStr = formatDateRange(weekStart, weekEnd);
    return {
      id: `w${n}`,
      number: n,
      label: `Week ${n}`,
      dateStr,
      isHoliday: !!holidays[n],
      holidayName: holidays[n] || ""
    };
  });
}

function formatDateRange(d1, d2) {
  const months = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
  const s = `${d1.getDate()} ${months[d1.getMonth()]}`;
  const e = `${d2.getDate()} ${months[d2.getMonth()]}`;
  return `${s} – ${e}`;
}

function recalcWeekDates() {
  // Recalculate dates for existing weeks without changing labels/holiday settings
  const base = state.startDate ? new Date(state.startDate) : new Date("2025-09-01");
  const day = base.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  base.setDate(base.getDate() + diff);

  state.weeks = state.weeks.map((w, i) => {
    const weekStart = new Date(base);
    weekStart.setDate(base.getDate() + i*7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    return { ...w, dateStr: formatDateRange(weekStart, weekEnd) };
  });
}

function uid() { return Math.random().toString(36).substr(2,9); }

function getWeekStartDate(wId) {
  const w = state.weeks.find(x => x.id === wId);
  if (!w || !w.dateStr) return null;
  // dateStr format: "1 sep – 7 sep", parse start date
  const base = state.startDate ? new Date(state.startDate) : new Date("2025-09-01");
  const day = base.getDay(); const diff = day===0?-6:1-day; base.setDate(base.getDate()+diff);
  const idx = state.weeks.findIndex(x => x.id === wId);
  if (idx < 0) return null;
  const ws = new Date(base); ws.setDate(base.getDate() + idx*7);
  return ws;
}

function isWeekInPast(wId) {
  const ws = getWeekStartDate(wId);
  if (!ws) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  // week is past if its Monday is before this week's Monday
  const thisMonday = new Date(today);
  const d = today.getDay(); const diff2 = d===0?-6:1-d;
  thisMonday.setDate(today.getDate()+diff2);
  return ws < thisMonday;
}

function getEval(wId, sId) {
  const stored = state.evaluations[`${wId}_${sId}`] || {};
  // For current week AND past weeks (not holidays), show Aanwezig + Goed defaults
  const w = state.weeks.find(x => x.id === wId);
  const isCurrentWeek = w && wId === state.selectedWeek;
  if ((isWeekInPast(wId) || isCurrentWeek) && w && !w.isHoliday) {
    const defaults = { aanwezig: "Aanwezig" };
    state.categories.forEach(cat => {
      if (cat.type === 'rating') defaults[cat.id] = "Goed";
      else if (cat.type === 'boolean') defaults[cat.id] = true;
    });
    return { ...defaults, ...stored };
  }
  return stored;
}
function setEvalField(wId, sId, field, val) {
  const key = `${wId}_${sId}`;
  if(!state.evaluations[key]) state.evaluations[key]={aanwezig:"Aanwezig",opmerking:""};
  state.evaluations[key][field] = val;
  saveState();
}

function allStudents() {
  return state.groups.flatMap(g=>g.classes.flatMap(c=>c.students.map(s=>({...s,classId:c.id,className:c.name,school:c.school,groupId:g.id,groupName:g.name}))));
}
function allClasses() {
  return state.groups.flatMap(g=>g.classes.map(c=>({...c,groupId:g.id,groupName:g.name})));
}
function groupStudents(groupId) {
  const g=state.groups.find(x=>x.id===groupId);
  if(!g) return [];
  return g.classes.flatMap(c=>c.students.map(s=>({...s,classId:c.id,className:c.name,school:c.school})));

const THEME_KEY = "lesnotitie_theme";

function saveTheme(themeName, customVars) {
  try {
    const t = { theme: themeName, custom: customVars || {} };
    localStorage.setItem(THEME_KEY, JSON.stringify(t));
    if (window._saveThemeToFirebase) window._saveThemeToFirebase(t);
  } catch(e) {}
}

function loadTheme() {
  try {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) {
      const t = JSON.parse(saved);
      if (t.theme) applyTheme(t.theme, false);
      if (t.custom) Object.entries(t.custom).forEach(([k,v])=>document.documentElement.style.setProperty(`--${k}`,v));
    }
  } catch(e) {}
}

function syncColorPickers(t) {
  const picks = {
    'pick-accent1': t.accent1,
    'pick-accent2': t.accent2,
    'pick-accent3': t.accent3,
    'pick-bg':      t.bg,
    'pick-surface': t.surface,
    'pick-text':    t.text,
    'pick-border':  t.border,
  };
  Object.entries(picks).forEach(([id,val])=>{ const el=document.getElementById(id); if(el&&val) el.value=val; });
}

function applyTheme(name, save=true) {
  const t = themes[name];
  if(!t) return;
  Object.entries(t).forEach(([k,v])=>document.documentElement.style.setProperty(`--${k}`,v));
  document.querySelectorAll('.theme-swatch').forEach(el=>el.classList.remove('active'));
  const idx = Object.keys(themes).indexOf(name);
  document.querySelectorAll('.theme-swatch')[idx]?.classList.add('active');
  syncColorPickers(t);
  if(save) saveTheme(name, {});
}

function resetToDefault() {
  applyTheme('lavender');
}

function setCustomColor(varName, val) {
  document.documentElement.style.setProperty(`--${varName}`, val);
  document.querySelectorAll('.theme-swatch').forEach(el=>el.classList.remove('active'));
  try {
    const saved = localStorage.getItem(THEME_KEY);
    const t = saved ? JSON.parse(saved) : { theme: null, custom: {} };
    t.custom = t.custom || {};
    t.custom[varName] = val;
    t.theme = null;
    localStorage.setItem(THEME_KEY, JSON.stringify(t));
    if(window._saveThemeToFirebase) window._saveThemeToFirebase(t);
  } catch(e) {}
}

function showToast(msg) {

// ===================== MODAL =====================
// Modal history stack
window._modalHistory = [];

function openModal(html, width, backFn) {
  const box = document.getElementById('modal-box');
  // Build back button if there's history
  const hasBack = window._modalHistory.length > 0;
  const backBtn = hasBack
    ? `<div style="margin-bottom:12px"><button onclick="_modalGoBack()" style="background:none;border:none;cursor:pointer;font-size:12px;font-weight:700;color:var(--accent1);font-family:'Nunito',sans-serif;padding:0;display:flex;align-items:center;gap:4px">← Terug</button></div>`
    : '';
  box.innerHTML = backBtn + html;
  if(width) box.style.maxWidth=width;
  else box.style.maxWidth='560px';
  document.getElementById('modal').style.display='flex';
}

function pushModal(html, width) {
  // Push current content to history, then open new
  const box = document.getElementById('modal-box');
  window._modalHistory.push({html: box.innerHTML, width: box.style.maxWidth});
  openModal(html, width);
}

function _modalGoBack() {
  if(!window._modalHistory.length) { closeModal(); return; }
  const prev = window._modalHistory.pop();
  const box = document.getElementById('modal-box');
  box.innerHTML = prev.html;
  box.style.maxWidth = prev.width;
}

function closeModal() {
  document.getElementById('modal').style.display='none';
  window._modalHistory = [];
}

function renderDashboard() {
  const students = allStudents();
  const classes = allClasses();
  const totalStudents = students.length;
  const totalClasses = classes.length;
  const totalGroups = state.groups.length;
  const nonHolidayWeeks = state.weeks.filter(w=>!w.isHoliday).length;

  // This week
  const today = new Date(); today.setHours(0,0,0,0);
  const thisMonday = new Date(today); const dd=today.getDay(); thisMonday.setDate(today.getDate()+(dd===0?-6:1-dd));
  const currentWeek = state.weeks.find((_,i)=>{
    const base=new Date(state.startDate); const d=base.getDay(); base.setDate(base.getDate()+(d===0?-6:1-d));
    const ws=new Date(base); ws.setDate(base.getDate()+i*7); ws.setHours(0,0,0,0);
    const we=new Date(ws); we.setDate(ws.getDate()+6); we.setHours(23,59,59,0);
    return today>=ws && today<=we;
  }) || state.weeks.find(w=>w.id===state.selectedWeek);

  // Per group stats
  const groupStats = state.groups.map(g=>{
    const gStudents = g.classes.flatMap(c=>c.students);
    return { id:g.id, name:g.name, count:gStudents.length, classes:g.classes.map(c=>({id:c.id,name:c.name,school:c.school,count:c.students.length,jaar:c.jaar})) };
  });

  // Attendance stats for past weeks
  const pastWeeks = state.weeks.filter(w=>{
    const idx=state.weeks.findIndex(x=>x.id===w.id);
    const base=new Date(state.startDate); const d=base.getDay(); base.setDate(base.getDate()+(d===0?-6:1-d));
    const ws=new Date(base); ws.setDate(base.getDate()+idx*7); ws.setHours(0,0,0,0);
    return ws<thisMonday && !w.isHoliday;
  });
  let totalEntries=0, absentCount=0, lateCount=0;
  pastWeeks.forEach(w=>{
    students.forEach(s=>{
      const ev=getEval(w.id,s.id);
      totalEntries++;
      if(ev.aanwezig==='Afwezig') absentCount++;
      if(ev.aanwezig==='Te laat') lateCount++;
    });
  });
  const aanwPct = totalEntries>0 ? Math.round(((totalEntries-absentCount)/totalEntries)*100) : 100;

  // Rating distribution for past weeks
  const ratingCounts = {Uitstekend:0,Goed:0,Voldoende:0,Onvoldoende:0,Slecht:0};
  const ratingCats = state.categories.filter(c=>c.type==='rating');
  pastWeeks.forEach(w=>{
    students.forEach(s=>{
      const ev=getEval(w.id,s.id);
      ratingCats.forEach(cat=>{
        const v=ev[cat.id];
        if(v && ratingCounts[v]!==undefined) ratingCounts[v]++;
      });
    });
  });
  const totalRatings = Object.values(ratingCounts).reduce((a,b)=>a+b,0);
  const ratingBar = totalRatings>0 ? Object.entries(ratingCounts).map(([k,v])=>{
    const colors={Uitstekend:'#34d399',Goed:'#60a5fa',Voldoende:'#fbbf24',Onvoldoende:'#fb923c',Slecht:'#f87171'};
    const pct=(v/totalRatings*100).toFixed(1);
    return `<div title="${k}: ${v} (${pct}%)" style="height:100%;width:${pct}%;background:${colors[k]};transition:width .3s"></div>`;
  }).join('') : '<div style="width:100%;height:100%;background:var(--border);border-radius:8px"></div>';

  // Group cards
  // Pre-compute opmerkingen per class
  const opmPerKlas = {};
  state.groups.forEach(g=>g.classes.forEach(c=>{
    let cnt=0;
    c.students.forEach(s=>{
      state.weeks.forEach(w=>{
        const ev=state.evaluations?.[w.id+'_'+s.id];
        if(ev?.opmerking?.trim()) cnt++;
      });
    });
    opmPerKlas[c.id]=cnt;
  }));

  const groupCards = groupStats.map((g,gi)=>`

function openAanwezigheidDetail(filter) {
  // Collect all students with aanwezigheid issues
  const filterMap = {'afwezig':'Afwezig','telaat':'Te laat','aanwezig':'Aanwezig'};
  const filterVal = filterMap[filter];
  const filterLabel = {afwezig:'Afwezig',telaat:'Te laat',aanwezig:'Aanwezig'}[filter];
  const filterColor = {afwezig:'#f87171',telaat:'#fbbf24',aanwezig:'#34d399'}[filter];
  
  const today = new Date(); today.setHours(0,0,0,0);
  const base=new Date(state.startDate); const d=base.getDay(); base.setDate(base.getDate()+(d===0?-6:1-d));
  const pastWeeks = state.weeks.filter((w,idx)=>{
    const ws=new Date(base); ws.setDate(base.getDate()+idx*7); ws.setHours(0,0,0,0);
    return ws<today && !w.isHoliday;
  });
  
  // Collect per student per week
  const entries = [];
  const sortedGroups = [...state.groups].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true}));
  sortedGroups.forEach(g=>{
    [...g.classes].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true})).forEach(c=>{
      [...c.students].sort((a,b)=>a.name.localeCompare(b.name,'nl')).forEach(s=>{
        const sEntries=[];
        pastWeeks.forEach(w=>{
          const ev=getEval(w.id,s.id);
          const aanw = ev.aanwezig || 'Aanwezig';
          if(filter==='aanwezig'?aanw==='Aanwezig':aanw===filterVal) {
            sEntries.push({week:w.label,date:w.dateStr});
          }
        });
        if(sEntries.length) entries.push({name:s.name,id:s.id,klas:c.name,groep:g.name,entries:sEntries});
      });
    });
  });
  
  if(!entries.length) { showToast(`Geen ${filterLabel.toLowerCase()} leerlingen gevonden`); return; }
  
  const rows = entries.map(e=>`
    <div style="border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--cream);cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div>
          <span style="font-weight:800;font-size:13px;color:var(--text);cursor:pointer" onclick="event.stopPropagation();openStudentProfile('${e.id}')">${esc(e.name)}</span>
          <span style="font-size:10px;color:var(--text3);margin-left:8px">${esc(e.klas)} · ${esc(e.groep)}</span>
        </div>
        <span style="background:${filterColor}22;color:${filterColor};border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700">${e.entries.length}×</span>
      </div>
      <div style="display:none;padding:8px 12px">
        ${e.entries.map(en=>`<div style="font-size:11px;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border)">${esc(en.week)} <span style="color:var(--text3)">${esc(en.date||'')}</span></div>`).join('')}
      </div>
    </div>`).join('');
  
  openModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="font-family:'Playfair Display',serif;font-size:18px">📅 ${filterLabel} — detail</div>
      <button onclick="closeModal()" style="margin-left:auto;background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕</button>
    </div>
    <div style="overflow-y:visible">${rows}</div>
  `, '720px');
}

function openBeoordelingDetail(rating) {
  const colors={Uitstekend:'#34d399',Goed:'#60a5fa',Voldoende:'#fbbf24',Onvoldoende:'#fb923c',Slecht:'#f87171'};
  const color = colors[rating] || 'var(--accent1)';
  const ratingCats = state.categories.filter(c=>c.type==='rating');
  
  const today = new Date(); today.setHours(0,0,0,0);
  const base=new Date(state.startDate); const d=base.getDay(); base.setDate(base.getDate()+(d===0?-6:1-d));
  const pastWeeks = state.weeks.filter((w,idx)=>{
    const ws=new Date(base); ws.setDate(base.getDate()+idx*7); ws.setHours(0,0,0,0);
    return ws<today && !w.isHoliday;
  });
  
  const entries = [];
  const sortedGroups = [...state.groups].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true}));
  sortedGroups.forEach(g=>{
    [...g.classes].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true})).forEach(c=>{
      [...c.students].sort((a,b)=>a.name.localeCompare(b.name,'nl')).forEach(s=>{
        const sEntries=[];
        pastWeeks.forEach(w=>{
          const ev=getEval(w.id,s.id);
          ratingCats.forEach(cat=>{
            if(ev[cat.id]===rating) sEntries.push({week:w.label,cat:cat.name});
          });
        });
        if(sEntries.length) entries.push({name:s.name,id:s.id,klas:c.name,groep:g.name,entries:sEntries});
      });
    });
  });
  
  if(!entries.length) { showToast(`Geen ${rating} beoordelingen gevonden`); return; }
  
  const rows = entries.map(e=>`
    <div style="border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--cream);cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div>
          <span style="font-weight:800;font-size:13px;color:var(--text);cursor:pointer" onclick="event.stopPropagation();openStudentProfile('${e.id}')">${esc(e.name)}</span>
          <span style="font-size:10px;color:var(--text3);margin-left:8px">${esc(e.klas)} · ${esc(e.groep)}</span>
        </div>
        <span style="background:${color}22;color:${color};border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700">${e.entries.length}× ${rating}</span>
      </div>
      <div style="display:none;padding:8px 12px">
        ${e.entries.map(en=>`<div style="font-size:11px;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border)">${esc(en.week)} — <span style="color:var(--text3)">${esc(en.cat)}</span></div>`).join('')}
      </div>
    </div>`).join('');
  
  openModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <span style="background:${color}22;color:${color};border-radius:12px;padding:4px 14px;font-weight:800;font-size:15px">${rating}</span>
      <div style="font-family:'Playfair Display',serif;font-size:18px">Beoordeling detail</div>
      <button onclick="closeModal()" style="margin-left:auto;background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕</button>
    </div>
    <div style="overflow-y:visible">${rows}</div>
  `, '720px');
}

function openOpmerkingDetail() {
  // Collect all students with opmerkingen, sorted by group > class > student
  const entries = [];
  const sortedGroups = [...state.groups].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true}));
  sortedGroups.forEach(g=>{
    [...g.classes].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true})).forEach(c=>{
      [...c.students].sort((a,b)=>a.name.localeCompare(b.name,'nl')).forEach(s=>{
        const opmerkingen=[];
        state.weeks.forEach(w=>{
          const ev=state.evaluations?.[w.id+'_'+s.id];
          if(ev?.opmerking?.trim()) opmerkingen.push({week:w.label,text:ev.opmerking.trim()});

        if(opmerkingen.length) entries.push({name:s.name,id:s.id,klas:c.name,groep:g.name,opmerkingen});

    <div style="border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--cream);cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">

          <span style="font-size:10px;color:var(--text3);margin-left:8px">${esc(e.klas)} · ${esc(e.groep)}</span>
        </div>
        <span style="background:var(--accent1)22;color:var(--accent1);border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700">💬 ${e.opmerkingen.length}</span>
      </div>
      <div style="display:none;padding:8px 12px">

      <div style="font-family:'Playfair Display',serif;font-size:18px">💬 Opmerkingen — overzicht</div>

    </div>

function dashSearch(q) {
  const res = document.getElementById('dash-search-results');
  if (!q.trim()) { res.innerHTML=''; return; }
  const matches = allStudents().filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  if (!matches.length) { res.innerHTML='<div style="font-size:12px;color:var(--text3)">Geen resultaten</div>'; return; }
  res.innerHTML = matches.slice(0,8).map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--border);cursor:pointer" onclick="openStudentProfile('${s.id}')">
      <div>
        <span style="font-size:13px;font-weight:700;color:var(--text)">${esc(s.name)}</span>
        <span style="font-size:10px;color:var(--text3);margin-left:6px">${esc(s.className)} · ${esc(s.groupName)}</span>
      </div>
      <span style="font-size:11px;color:var(--accent1)">→</span>
    </div>`).join('');
}

let studentSearchQuery = '';

// ===================== STUDENT LIST (with search) =====================
function countOpmerkingen(sId) {
  let count = 0;
  state.weeks.forEach(w => {
    const ev = state.evaluations?.[w.id]?.[sId];
    if (ev?.opmerking && ev.opmerking.trim()) count++;
  });
  return count;
}

function renderStudentList() {
  if(state.groups.length===0) return `<div class="card" style="text-align:center;padding:60px">
    <div style="font-size:48px;margin-bottom:12px">👤</div>
    <div style="font-size:18px;font-weight:800;color:var(--text2);margin-bottom:12px">Geen leerlingen</div>
    <button class="btn btn-primary" onclick="switchView('settings')">Instellingen →</button>
  </div>`;

  const q = studentSearchQuery.toLowerCase();

  // Group by school > group > class > student (all sorted)
  const allSchoolNames = [...new Set(allStudents().map(s=>s.school||'—'))].sort();
  let content = '';

  allSchoolNames.forEach(schoolName => {
    const schoolGroups = state.groups.filter(g => g.classes.some(c => c.school === schoolName));
    if (!schoolGroups.length) return;
    
    content += `<div class="card" style="margin-bottom:16px">
      <div style="font-size:16px;font-weight:900;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)">🏫 ${esc(schoolName)}</div>`;
    
    const sortedGroups = [...schoolGroups].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true}));
    sortedGroups.forEach(g => {
      const sortedClasses = [...g.classes.filter(c=>c.school===schoolName)].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true}));
      sortedClasses.forEach(c => {
        const sortedStudents = [...c.students].sort((a,b)=>a.name.localeCompare(b.name,'nl'));
        const filteredStudents = sortedStudents.filter(s=>!q||s.name.toLowerCase().includes(q));
        if (!filteredStudents.length) return;
        
        content += `<div style="margin-bottom:12px">
          <div style="font-size:12px;font-weight:800;color:var(--accent1);margin-bottom:6px;display:flex;align-items:center;gap:8px">
            <span>📚 ${esc(g.name)} &rsaquo; ${esc(c.name)}</span>
            ${c.jaar?`<span style="font-size:10px;background:var(--accent1)22;color:var(--accent1);border-radius:6px;padding:1px 6px">${c.jaar}e jaar</span>`:''}
          </div>
          <div class="tbl-wrap"><table>
            <thead><tr><th>Naam</th><th style="text-align:center">Opmerking</th><th></th></tr></thead>
            <tbody>
              ${filteredStudents.map(s => {
                const opCount = countOpmerkingen(s.id);
                return `<tr>
                  <td><span class="student-link" onclick="openStudentProfile('${s.id}')">${esc(s.name)}</span></td>
                  <td style="width:140px;text-align:center">
                    ${opCount > 0 
                      ? `<span style="background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700;cursor:pointer" onclick="openStudentOpmerkingen('${s.id}')">💬 ${opCount} opmerking${opCount>1?'en':''}</span>`
                      : `<span style="font-size:11px;color:var(--text3)">—</span>`}
                  </td>
                  <td style="text-align:right"><button class="btn btn-secondary btn-sm" onclick="openStudentProfile('${s.id}')">Profiel →</button></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table></div>
        </div>`;
      });
    });
    content += `</div>`;
  });

  if (!content) content = `<div class="card" style="text-align:center;padding:30px;color:var(--text3)">Geen resultaten</div>`;

function modalBulkDelete() {
  const groupOpts = state.groups.map(g=>`
    <div style="margin-bottom:12px">
      <div style="font-weight:800;color:var(--text);margin-bottom:6px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="bulk-g-${g.id}" onchange="toggleBulkGroup('${g.id}',this.checked)" style="accent-color:var(--accent1);width:15px;height:15px">
          📚 ${esc(g.name)} <span style="font-size:10px;color:var(--text3)">(hele groep)</span>
        </label>
      </div>
      ${g.classes.map(c=>`
        <div style="margin-left:24px;margin-bottom:4px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="bulk-c-${c.id}" style="accent-color:var(--accent2);width:13px;height:13px">
            🏫 ${esc(c.name)} <span style="font-size:10px;color:var(--text3)">${esc(c.school)} · ${c.students.length} leerlingen</span>
          </label>
        </div>`).join('')}
    </div>`).join('');

  openModal(`<div class="modal-title">🗑 Toplu silme</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:16px">Silmek istediğin grupları veya sınıfları seç. Bu işlem geri alınamaz!</p>
    ${groupOpts}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-danger" onclick="doBulkDelete()">🗑 Seçilenleri Sil</button>
    </div>`);
}

function toggleBulkGroup(gId, checked) {
  const g = state.groups.find(x=>x.id===gId);
  if (!g) return;
  g.classes.forEach(c=>{ const el=document.getElementById(`bulk-c-${c.id}`); if(el) el.checked=checked; });
}

function doBulkDelete() {
  const toDeleteGroups=[], toDeleteClasses=[];
  state.groups.forEach(g=>{
    if(document.getElementById(`bulk-g-${g.id}`)?.checked) { toDeleteGroups.push(g.id); return; }
    g.classes.forEach(c=>{ if(document.getElementById(`bulk-c-${c.id}`)?.checked) toDeleteClasses.push(c.id); });
  });
  if (!toDeleteGroups.length && !toDeleteClasses.length) { showToast("Niets geselecteerd"); return; }
  if (!confirm(`${toDeleteGroups.length} groep(en) en ${toDeleteClasses.length} klas(sen) verwijderen?`)) return;
  // Delete full groups
  state.groups = state.groups.filter(g=>!toDeleteGroups.includes(g.id));
  // Delete specific classes
  state.groups.forEach(g=>{ g.classes = g.classes.filter(c=>!toDeleteClasses.includes(c.id)); });
  state.groups = state.groups.filter(g=>g.classes.length>0);
  saveState(); closeModal(); render();
  showToast("✅ Verwijderd!");
}

function renderUurSlotCell(key, slot) {
  const typeColors = {
    les: 'var(--accent1)',
    vrij: 'var(--text3)',
    wacht: 'var(--accent3)',
    toezicht: '#f59e0b',
    vergadering: '#8b5cf6',
    vervanging: '#06b6d4',
    verlof: '#ef4444',
    custom: 'var(--accent2)',
  };
  const typeBgs = {
    les: '#ffffff',
    vrij: '#f0fdf4',
    wacht: '#fff7ed',
    toezicht: '#fffbeb',
    vergadering: '#f5f3ff',
    vervanging: '#ecfeff',
    verlof: '#fef2f2',
    pauze: '#f0fdf4',
    custom: '#fdf2f8',
  };
  const color = typeColors[slot.type] || 'var(--text2)';
  const bg = typeBgs[slot.type] || 'var(--surface)';
  
  // Build content
  let content = '';
  if (slot.type === 'vrij') {
    content = `<div style="font-size:13px;color:#16a34a;font-weight:800;text-align:center;padding:12px 0">✓ VRIJ</div>`;
  } else if (slot.type !== 'les') {
    content = `<div style="font-size:12px;font-weight:800;color:${color};text-align:center;padding:12px 4px">${esc(slot.label||slot.type.toUpperCase())}</div>`;
  } else {
    // Les slot — new layout: lokaal top, school top-left, groep, klassen (with count), leerlingen link
    const lokalBadge = ''; // Lokaal hidden from cell view (shown in edit modal)
    
    // Build groep detail: school > groep > klassen > leerlingen link
    let groepBlocks = '';
    const groepIds = slot.groepIds||[];
    if(groepIds.length) {
      [...groepIds].forEach(gId => {
        const g = state.groups.find(x=>x.id===gId||x.name===gId);
        if(!g) return;
        // School name (from first class)
        const school = g.classes[0]?.school||'';
        // Count total students in this groep
        const totalSt = g.classes.reduce((s,c)=>s+c.students.length,0);
        groepBlocks += `<div style="margin-bottom:3px">`;
        if(school) groepBlocks += `<div style="font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.3px;margin-bottom:1px">${esc(school)}</div>`;
        // Groep name + klassen inline (horizontal)
        const sortedCls = [...g.classes].sort((a,b)=>a.name.localeCompare(b.name,'nl',{numeric:true}));
        const klasTags = sortedCls.map(c=>`<span onclick="event.stopPropagation();openKlasPopup('${c.id}')" style="display:inline-block;background:${color}18;color:${color};border-radius:5px;padding:1px 7px;font-size:12px;font-weight:800;cursor:pointer;margin-right:3px">${esc(c.name)} <span style="font-weight:500;opacity:.75">(${c.students.length})</span></span>`).join('');
        groepBlocks += `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;cursor:pointer;margin-bottom:2px" onclick="event.stopPropagation();openGroepDetailFromSlot('${gId}')">
          <span style="font-size:13px;font-weight:900;color:${color}">📚 ${esc(g.name)}</span>
          ${klasTags}
        </div>`;
        groepBlocks += `</div>`;
      });
    } else {
      groepBlocks = `<div style="font-size:8px;color:var(--text3);font-style:italic">Geen groep</div>`;
    }
    
    content = `${lokalBadge}${groepBlocks}`;
  }
  
  // Count students in this slot
  let studentCount = 0;
  if (slot.type==='les' && slot.groepIds?.length) {
    slot.groepIds.forEach(gId=>{
      const g = state.groups.find(x=>x.id===gId||x.name===gId);
      if(g) studentCount += g.classes.reduce((s,c)=>s+c.students.length,0);
    });
  }
  
  const countBadge = ''; // Count shown inline per klas tag
  
  return `<div style="position:relative;background:${bg};border-radius:8px;padding:8px 9px;border:1.5px solid ${slot.type==='les'?color+'44':'var(--border)'};min-height:80px;transition:all .12s" onmouseover="this.style.boxShadow='0 2px 10px ${color}33';this.style.borderColor='${color}';this.querySelector('.uur-edit-btn').style.opacity='1'" onmouseout="this.style.boxShadow='none';this.style.borderColor='${slot.type==='les'?color+'44':'var(--border)'}';this.querySelector('.uur-edit-btn').style.opacity='0'">
    <div onclick="openUurSlotEdit('${key}')" style="cursor:pointer;min-height:60px">${content}</div>
    <button class="uur-edit-btn" onclick="event.stopPropagation();openUurSlotEdit('${key}')" style="position:absolute;top:4px;right:4px;opacity:0;background:${color}22;border:1px solid ${color}44;border-radius:6px;padding:2px 7px;cursor:pointer;font-size:11px;color:${color};font-family:'Nunito',sans-serif;font-weight:700;transition:opacity .15s">✏️</button>
  </div>`;
}

function setSlotType(key, type) {
  const ur = window._uurrooster;
  if(!ur.slots[key]) ur.slots[key] = {type:'vrij',lokal:'',label:'',groepIds:[],klasIds:[]};
  ur.slots[key].type = type;
  // Update UI toggle
  const lesFields = document.getElementById('uur-les-fields');
  const customFields = document.getElementById('uur-custom-fields');
  if(lesFields) lesFields.style.display = type==='les' ? 'block' : 'none';
  if(customFields) customFields.style.display = (type!=='les'&&type!=='vrij') ? 'block' : 'none';
  // Update button styles
  document.querySelectorAll('[onclick^="setSlotType"]').forEach(btn=>{
    const btnType = btn.getAttribute('onclick').match(/'([^']+)'\)$/)?.[1];
    btn.style.background = btnType===type ? 'var(--accent1)' : 'var(--surface)';
    btn.style.color = btnType===type ? '#fff' : 'var(--text2)';
    btn.style.borderColor = btnType===type ? 'var(--accent1)' : 'var(--border)';
  });
}

function renameUurLokaal(slotKey, oldName) {
  const newName = prompt(`Lokaal hernoemen (was: ${oldName}):`, oldName);
  if(!newName || newName===oldName) return;
  const ur = window._uurrooster;
  Object.keys(ur.slots||{}).forEach(k=>{
    if(ur.slots[k].lokal===oldName) ur.slots[k].lokal=newName;
  });
  if(document.getElementById('uur-lokal')?.value===oldName) document.getElementById('uur-lokal').value=newName;
  saveUurrooster(); openUurSlotEdit(slotKey); showToast(`✅ ${oldName} → ${newName}`);
}
function deleteUurLokaal(slotKey, name) {
  if(!confirm(`"${name}" alle slots'tan kaldırılsın mı?`)) return;
  const ur = window._uurrooster;
  Object.keys(ur.slots||{}).forEach(k=>{
    if(ur.slots[k].lokal===name) ur.slots[k].lokal='';
  });
  saveUurrooster(); openUurSlotEdit(slotKey); showToast(`✅ ${name} kaldırıldı`);
}
function filterKlasBtns2(groepId) {
  const g = state.groups.find(x=>x.id===groepId);
  if(!g) return;
  const cls = g.classes.map(c=>c.id);
  document.querySelectorAll('#uur-klas-btns2 button').forEach(btn=>{
    const kid = btn.getAttribute('data-cls-id');
    btn.style.display = cls.includes(kid) ? '' : 'none';
  });
}
function addStudentFromSlot(slotKey) {
  const name = document.getElementById('uur-new-name')?.value?.trim();
  // Try window variable first (set by klas button click), fallback to hidden input
  const klasId = window._uurNewKlasId || document.getElementById('uur-new-klas')?.value?.trim();
  const school = document.getElementById('uur-new-school')?.value?.trim();
  if(!name) { showToast('⚠️ Naam is verplicht'); return; }
  if(!klasId) { showToast('⚠️ Selecteer eerst een klas hierboven'); return; }

  // Find or create the class in state.groups
  let targetClass = null;
  let targetGroup = null;
  state.groups.forEach(g=>g.classes.forEach(c=>{ if(c.id===klasId||c.name===klasId){targetClass=c;targetGroup=g;} }));

  if(!targetClass) {
    // Create new class in first group (or new group)
    let grp = state.groups[0];
    if(!grp) { grp = {id:'g'+Date.now(),name:'Groep 1',classes:[]}; state.groups.push(grp); }
    targetClass = {id:klasId, name:klasId, school:school||'', jaar:null, students:[]};
    grp.classes.push(targetClass);
    targetGroup = grp;
  }

  // Check for duplicate
  if(targetClass.students.find(s=>s.name.toLowerCase()===name.toLowerCase())) {
    showToast('⚠️ Leerling bestaat al in deze klas'); return;
  }

  const newStudent = {id:'s'+Date.now()+'_'+Math.random().toString(36).slice(2,6), name, school:school||targetClass.school||''};
  targetClass.students.push(newStudent);

  // Auto-link the slot to this group if not already
  const ur = window._uurrooster;
  if(!ur.slots[slotKey]) ur.slots[slotKey]={type:'les',lokal:'',label:'',groepIds:[],klasIds:[]};
  if(targetGroup&&!ur.slots[slotKey].groepIds.includes(targetGroup.id)) {
    ur.slots[slotKey].groepIds.push(targetGroup.id);
  }
  if(!ur.slots[slotKey].klasIds.includes(klasId)) {
    ur.slots[slotKey].klasIds.push(klasId);
  }

  saveState();
  saveUurrooster();
  showToast(`✅ ${name} toegevoegd aan ${klasId}`);

  // Clear inputs
  ['uur-new-name','uur-new-klas'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  window._uurNewKlasId = null; window._uurNewKlasName = null;

  // Refresh modal
  openUurSlotEdit(slotKey);
}

function toggleSlotGroep(key, gId) {

function saveUurroosterSettings() {
  const ur = window._uurrooster;
  ur.tijden.forEach((t,i)=>{
    const s = document.getElementById(`ts-${i}`)?.value?.trim();
    const e = document.getElementById(`te-${i}`)?.value?.trim();
    if(s) t.start = s;
    if(e) t.end = e;
  });
  // Save pauzes
  const newPauzes = [];
  const newToezicht = {};
  (ur.pauzes||[]).forEach((p,pi)=>{
    const uur = parseInt(document.getElementById(`pz-uur-${pi}`)?.value||p.na_uur);
    const lbl = document.getElementById(`pz-lbl-${pi}`)?.value?.trim()||p.label;
    const tz = document.getElementById(`pz-tz-${pi}`)?.value?.trim()||'';
    newPauzes.push({na_uur:uur,label:lbl});
    if(tz) newToezicht[uur]=tz;
  });
  ur.pauzes = newPauzes;
  ur.toezicht = newToezicht;
  saveUurrooster(); closeModal(); render();
  showToast("✅ Instellingen opgeslagen");
}

  ur.pauzes.forEach((p,pi)=>{
    if(pi===idx) return;

    const lbl = document.getElementById(`pz-lbl-${pi}`)?.value?.trim()||p.label;
    const tz = document.getElementById(`pz-tz-${pi}`)?.value?.trim()||'';
    newPauzes.push({na_uur:uur,label:lbl});
    if(tz) newToezicht[uur]=tz;
  });
  ur.pauzes = newPauzes;
  ur.toezicht = newToezicht;
  saveUurrooster();
  openUurroosterSettings();
}

function addUurBtn() {

  // Open klas popup with back button (uses pushModal)
  let found=null, foundGroup=null;
  state.groups.forEach(g=>g.classes.forEach(c=>{ if(c.id===classId){found=c;foundGroup=g;} }));
  if(!found) return;
  const sortedStudents = [...found.students].sort((a,b)=>a.name.localeCompare(b.name,'nl'));
  const currentWId = state.selectedWeek;
  const currentWeekLabel = state.weeks.find(w=>w.id===currentWId)?.label||'';
  const rating = state.categories.find(c=>c.type==='rating');
  const studentRows = sortedStudents.map(s=>{
    const ev = getEval(currentWId, s.id);
    const aanw = ev.aanwezig||'Aanwezig';
    const color = aanw==='Afwezig'?'#f87171':aanw==='Te laat'?'#fbbf24':'#34d399';
    const ratingVal = rating ? (ev[rating.id]||'—') : '';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></span>
      <span onclick="pushStudentProfile('${s.id}')" style="font-size:13px;font-weight:700;color:var(--text);cursor:pointer;flex:1" onmouseover="this.style.color='var(--accent1)'" onmouseout="this.style.color='var(--text)'">${esc(s.name)}</span>
      <span style="font-size:10px;color:var(--text3)">${esc(aanw)}</span>
      ${ratingVal&&ratingVal!=='—'?`<span style="font-size:10px;background:var(--surface2);border-radius:6px;padding:2px 7px;font-weight:700;color:var(--text2)">${esc(ratingVal)}</span>`:''}
      <button onclick="editWeekEvalInline('${currentWId}','${s.id}')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;cursor:pointer;font-size:10px;color:var(--text3);font-family:'Nunito',sans-serif">✏️</button>
    </div>`;
  }).join('');
  pushModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:20px">🎓 ${esc(found.name)}</div>
        <div style="font-size:11px;color:var(--text3)">${esc(found.school||'')} · ${foundGroup?esc(foundGroup.name):''} · ${found.students.length} leerlingen</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button onclick="openInlineGroepEdit('${foundGroup?.id||''}')" style="padding:4px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);cursor:pointer;font-size:11px;font-weight:700;color:var(--text3);font-family:'Nunito',sans-serif">✏️ Bewerken</button>
        <button onclick="closeModal()" style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕</button>
      </div>
    </div>
    <div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:10px">📅 ${esc(currentWeekLabel)} — aanwezigheid & beoordeling</div>
    <div style="overflow-y:visible">${studentRows||'<div style="color:var(--text3);text-align:center;padding:20px">Geen leerlingen</div>'}</div>
  `, '600px');
}

function pushStudentProfile(sId) {
  // Navigate to student profile FROM a modal (not full page switch)
  const s = allStudents().find(x=>x.id===sId);
  if(!s) return;
  // Build a compact student profile in the modal
  const weeks = state.weeks.filter(w=>!w.isHoliday);
  let rows = '';
  weeks.forEach(w=>{
    const ev = getEval(w.id, s.id);
    const aanw = ev.aanwezig||'Aanwezig';
    const col = aanw==='Afwezig'?'#f87171':aanw==='Te laat'?'#fbbf24':'#34d399';
    rows += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:11px;color:var(--text3);width:60px;flex-shrink:0">${esc(w.label)}</span>
      <span style="width:7px;height:7px;border-radius:50%;background:${col}"></span>
      <span style="font-size:11px;color:var(--text2)">${esc(aanw)}</span>

      <button onclick="closeModal()" style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕</button>

  `, '580px');

function openSlotStudentDetail(sId) {
  const s = allStudents().find(x=>x.id===sId);
  if(!s) return;
  const weeks = state.weeks.filter(w=>!w.isHoliday);
  const ratingChipClass = {Uitstekend:'chip-green',Goed:'chip-blue',Voldoende:'chip-yellow',Onvoldoende:'chip-orange',Slecht:'chip-red'};
  const currentWeekId = state.selectedWeek;
  const currentWeekIdx = getCurrentWeekIdx();

  let cards = '';
  weeks.forEach((w,wi) => {
    const ev = getEval(w.id, s.id);
    const isCurrent = w.id === currentWeekId;
    const isPast = wi <= currentWeekIdx;
    const hasData = Object.keys(ev).some(k=>k!=='aanwezig'&&k!=='opmerking'&&ev[k]!==undefined&&ev[k]!==null&&ev[k]!=='');
    
    let chips = '';
    if(isPast || hasData || ev.opmerking) {
      state.categories.forEach(cat=>{
        const v = ev[cat.id];
        if(v===undefined||v===null||v==='') return;
        const cls = ratingChipClass[v] || 'chip-gray';
        chips += `<span class="cat-chip ${cls}"><b>${esc(cat.label)}:</b> ${cat.type==='boolean'?(v?'✓':'✗'):esc(String(v))}</span>`;
      });
      if(ev.opmerking) chips += `<div style="font-size:10px;background:#fef3c7;border:1px solid #fde68a;color:#92400e;border-radius:6px;padding:4px 8px;margin-top:4px;font-style:italic;width:100%">💬 ${esc(ev.opmerking)}</div>`;
    }
    const hasAny = chips.length>0 || (ev.aanwezig && ev.aanwezig!=='Aanwezig');
    
    // Current week: show inline edit controls
    let editSection = '';
    if(isCurrent && !w.isHoliday) {
      const aanwOpts = ['Aanwezig','Afwezig','Te laat'].map(opt=>`<button onclick="setSlotEval('${w.id}','${s.id}','aanwezig','${opt}');event.stopPropagation()" style="padding:3px 8px;border-radius:12px;border:1.5px solid ${(ev.aanwezig||'Aanwezig')===opt?'var(--accent1)':'var(--border)'};background:${(ev.aanwezig||'Aanwezig')===opt?'var(--accent1)':'var(--surface)'};color:${(ev.aanwezig||'Aanwezig')===opt?'#fff':'var(--text2)'};cursor:pointer;font-size:10px;font-weight:700;font-family:'Nunito',sans-serif">${opt}</button>`).join('');
      const ratingOpts = ['Uitstekend','Goed','Voldoende','Onvoldoende','Slecht'];
      let catEdits = state.categories.filter(c=>c.type==='rating').map(cat=>{
        const v = ev[cat.id]||'Goed';
        const opts = ratingOpts.map(r=>`<button onclick="setSlotEval('${w.id}','${s.id}','${cat.id}','${r}');event.stopPropagation()" style="padding:2px 7px;border-radius:10px;border:1px solid ${v===r?'var(--accent1)':'var(--border)'};background:${v===r?'var(--accent1)':'var(--surface)'};color:${v===r?'#fff':'var(--text3)'};cursor:pointer;font-size:9px;font-family:'Nunito',sans-serif">${r}</button>`).join('');
        return `<div style="margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:var(--text3);margin-right:4px">${esc(cat.label)}:</span>${opts}</div>`;
      }).join('');
      const numCats = state.categories.filter(c=>c.type==='number').map(cat=>`<div style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:var(--text3)">${esc(cat.label)}:</span><input type="number" value="${ev[cat.id]||''}" onchange="setSlotEval('${w.id}','${s.id}','${cat.id}',this.value)" style="width:52px;border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:10px;font-family:'Nunito',sans-serif"></div>`).join('');
      const boolCats = state.categories.filter(c=>c.type==='boolean').map(cat=>`<label style="display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--text3);cursor:pointer;margin-right:8px;margin-bottom:4px"><input type="checkbox" ${ev[cat.id]?'checked':''} onchange="setSlotEval('${w.id}','${s.id}','${cat.id}',this.checked)"> ${esc(cat.label)}</label>`).join('');
      
      editSection = `<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
        <div style="font-size:9px;font-weight:800;color:var(--text3);margin-bottom:6px">AANWEZIGHEID</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${aanwOpts}</div>
        <div style="font-size:9px;font-weight:800;color:var(--text3);margin-bottom:4px">BEOORDELING</div>
        ${catEdits}${numCats}${boolCats}
        <div style="margin-top:6px">
          <textarea placeholder="Opmerking…" onchange="setSlotEval('${w.id}','${s.id}','opmerking',this.value)" style="width:100%;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:10px;font-family:'Nunito',sans-serif;resize:vertical;min-height:44px">${esc(ev.opmerking||'')}</textarea>
        </div>
      </div>`;
    }

    cards += `<div style="border:${isCurrent?'2px solid var(--accent1)':'1px solid var(--border)'};border-radius:10px;padding:10px 12px;margin-bottom:8px;background:${isCurrent?'var(--surface2)':'var(--surface)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-weight:800;color:var(--accent1);font-size:12px">${w.label}</span>
        <span style="font-size:10px;color:var(--text3)">${w.dateStr||''}</span>
        ${ev.aanwezig?`<span class="aanw-btn sel-${(ev.aanwezig||'Aanwezig').replace(' ','-')}" style="pointer-events:none;font-size:9px;padding:1px 5px">${ev.aanwezig}</span>`:''}
      </div>
      ${hasAny && !isCurrent ? `<div style="display:flex;flex-wrap:wrap">${chips}</div>` : ''}
      ${editSection}
    </div>`;
  });

  openModal(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:18px">${esc(s.name)}</div>
        <div style="font-size:11px;color:var(--text3)">${esc(s.className||'')} · ${esc(s.school||'')}</div>
      </div>
      <button onclick="closeModal()" style="margin-left:auto;background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕</button>
    </div>
    <div style="overflow-y:visible;padding-right:4px">${cards}</div>`);
}

  if(!s) return;

  state.weeks.forEach(w=>{
    const ev = state.evaluations?.[w.id]?.[sId];

    rows += `<tr>
      <td style="font-weight:700;color:var(--accent1);white-space:nowrap;padding:8px 12px">${w.label}</td>
      <td style="font-size:11px;color:var(--text3);padding:8px 12px">${w.dateStr||''}</td>

  openModal(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">

    </div>

          <th style="padding:8px 12px;font-size:10px;font-weight:800;color:var(--text2)">Week</th>
          <th style="padding:8px 12px;font-size:10px;font-weight:800;color:var(--text2)">Datum</th>
