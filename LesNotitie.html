function editWeekEvalInline(wId, sId) {
  // Always open a quick-edit popup — never navigate away
  const w = state.weeks.find(x=>x.id===wId);
  const s = allStudents().find(x=>x.id===sId);
  if(!w||!s) return;
  const ev = getEval(wId, sId);

  const aanwOpts = ['Aanwezig','Afwezig','Te laat'].map(opt=>
    `<button onclick="setEvalField('${wId}','${sId}','aanwezig','${opt}');document.getElementById('qe-aanw-${opt.replace(' ','-')}').classList.add('sel-${opt.replace(' ','-')}');document.querySelectorAll('.qe-aanw-btn').forEach(b=>b!==document.getElementById('qe-aanw-${opt.replace(' ','-')}')&&b.classList.remove('sel-Aanwezig','sel-Afwezig','sel-Te-laat'))"
     id="qe-aanw-${opt.replace(' ','-')}" class="aanw-btn qe-aanw-btn ${(ev.aanwezig||'Aanwezig')===opt?'sel-'+opt.replace(' ','-'):''}"
     style="font-size:11px;padding:4px 10px">${opt}</button>`).join('');

  let catEdits = state.categories.map((cat, _catIdx)=>{
    const v = ev[cat.id];
    const _zebra = _catIdx%2===0 ? 'background:var(--cream)' : 'background:var(--surface)';
    if(cat.type==='rating') {
      const opts = ['Uitstekend','Goed','Voldoende','Onvoldoende','Slecht'];
      const btns = opts.map(r=>`<button onclick="setEvalField('${wId}','${sId}','${cat.id}','${r}');this.closest('.qe-cat-row').querySelectorAll('.r-btn').forEach(b=>b.classList.remove('sel-Uitstekend','sel-Goed','sel-Voldoende','sel-Onvoldoende','sel-Slecht'));this.classList.add('sel-${r}')"
        class="r-btn ${v===r?'sel-'+r:''}" style="font-size:10px;padding:2px 7px">${r}</button>`).join('');
      return `<div class="qe-cat-row" style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;flex-wrap:wrap;${_zebra}"><div style="font-size:10px;font-weight:800;color:var(--text3);min-width:80px;flex-shrink:0">${esc(cat.label)}</div><div style="display:flex;flex-wrap:wrap;gap:3px">${btns}</div></div>`;
    } else if(cat.type==='boolean') {
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;flex-wrap:wrap;${_zebra}">
        <span style="font-size:10px;font-weight:700;color:var(--text3);min-width:80px">${esc(cat.label)}</span>
        <button onclick="setEvalField('${wId}','${sId}','${cat.id}',true);this.classList.add('sel-yes');this.nextElementSibling.classList.remove('sel-yes')" class="bool-btn ${v===true?'sel-yes':''}" style="font-size:10px">✓ Ja</button>
        <button onclick="setEvalField('${wId}','${sId}','${cat.id}',false);this.classList.add('sel-no');this.previousElementSibling.classList.remove('sel-no')" class="bool-btn ${v===false?'sel-no':''}" style="font-size:10px">✗ Nee</button>
      </div>`;
    } else {
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;flex-wrap:wrap;${_zebra}">
        <span style="font-size:10px;font-weight:700;color:var(--text3);min-width:80px">${esc(cat.label)}</span>
        <input type="number" value="${v??''}" onchange="setEvalField('${wId}','${sId}','${cat.id}',this.value)" style="width:70px;border:1.5px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;font-family:'Nunito',sans-serif">
      </div>`;
    }
  }).join('');

  openModal(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:18px">✏️ ${esc(s.name)}</div>
        <div style="font-size:11px;color:var(--text3)">${esc(w.label)} · ${esc(w.dateStr||'')}</div>
      </div>
      <button onclick="closeModal()" style="margin-left:auto;background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕</button>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Aanwezigheid</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${aanwOpts}</div>
    </div>
    <div style="margin-bottom:12px">${catEdits}</div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Opmerking</div>
      <textarea onchange="setEvalField('${wId}','${sId}','opmerking',this.value)" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px;font-family:'Nunito',sans-serif;font-size:12px;resize:vertical;min-height:60px" placeholder="Notitie...">${esc(ev.opmerking||'')}</textarea>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:8px;border-top:1px solid var(--border);margin-top:8px">
      <button class="btn btn-ghost" onclick="closeModal();renderMain()">✕ Sluiten</button>
      <button class="btn btn-primary" onclick="closeModal();renderMain()">✅ Opslaan</button>
    </div>
  `, '550px');
}

function renderStudentProfile() {
  const s = state.selectedStudent;
  if(!s) return '';
  const weeks = state.weeks.filter(w=>!w.isHoliday);
  const ratingChipClass = { Uitstekend:'chip-green', Goed:'chip-blue', Voldoende:'chip-yellow', Onvoldoende:'chip-orange', Slecht:'chip-red' };
  const totalOp = countOpmerkingen(s.id);

  let cards = weeks.map(w=>{
    const ev = getEval(w.id, s.id);
    const hasData = Object.keys(ev).filter(k=>k!=='aanwezig'&&k!=='opmerking').some(k=>ev[k]!==undefined&&ev[k]!==null&&ev[k]!=='');
    let chips = '';
    if(hasData || ev.aanwezig || ev.opmerking) {
      state.categories.forEach(cat=>{
        const v = ev[cat.id];
        if(v===undefined||v===null||v==='') return;
        const cls = ratingChipClass[v] || 'chip-gray';
        chips += `<span class="cat-chip ${cls}"><b>${esc(cat.label)}:</b> ${cat.type==='boolean'?(v?'✓':'✗'):esc(String(v))}</span>`;
      });
      if(ev.opmerking) chips += `<div style="font-size:10px;background:#fef3c7;border:1px solid #fde68a;color:#92400e;border-radius:6px;padding:4px 8px;margin-top:6px;font-style:italic;width:100%">💬 ${esc(ev.opmerking)}</div>`;
    }
    const hasAny = chips.length > 0 || (ev.aanwezig && ev.aanwezig !== 'Aanwezig');

    return `<div class="week-card ${hasAny?'':'empty'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:800;color:var(--accent1);font-size:13px">${w.label}</span>
        <div style="display:flex;align-items:center;gap:4px">
          ${ev.aanwezig?`<span class="aanw-btn sel-${(ev.aanwezig||'Aanwezig').replace(' ','-')}" style="pointer-events:none;font-size:9px;padding:1px 5px">${ev.aanwezig}</span>`:''}
          <button onclick="editWeekEvalInline('${w.id}','${s.id}')" title="Bewerk evaluatie voor deze week" style="background:none;border:1px solid var(--border);border-radius:5px;padding:1px 6px;cursor:pointer;font-size:10px;color:var(--text3);font-family:'Nunito',sans-serif" onmouseover="this.style.color='var(--accent1)';this.style.borderColor='var(--accent1)'" onmouseout="this.style.color='var(--text3)';this.style.borderColor='var(--border)'">✏️</button>
        </div>
      </div>
      ${hasAny ? `<div style="display:flex;flex-wrap:wrap">${chips}</div>` : '<div style="font-size:10px;color:var(--text3)">Geen gegevens</div>'}
    </div>`;
  }).join('');

  return `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="goBack()">← Terug</button>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:22px">${esc(s.name)}</div>
        <div style="font-size:12px;color:var(--text3)">${esc(s.className||'')} · ${esc(s.school||'')}</div>
      </div>
      ${totalOp>0 ? `<button class="btn btn-secondary btn-sm" onclick="openStudentOpmerkingen('${s.id}')" style="margin-left:auto">💬 Toon alle opmerkingen (${totalOp})</button>` : ''}
    </div>
    <div class="profile-grid">${cards}</div>`;
}

// ===================== JAARPLANNEN =====================
function renderJaarplannen() {
  const selectedJaar = state._jpSelectedJaar || '1';
  const selectedThema = state._jpSelectedThema || '';
  
  // Year tabs
  const jaarTabs = ['1','2','3','4','5','6'].map(j => {
    const sel = j === selectedJaar;
    return `<button onclick="jpSelectJaar('${j}')" style="padding:7px 18px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;background:${sel?'var(--accent1)':'var(--surface)'};color:${sel?'#fff':'var(--text2)'};box-shadow:${sel?'0 2px 10px rgba(192,132,252,.3)':'none'};transition:all .15s">${j}e jaar</button>`;
  }).join('');
  
  // Thema filter buttons
  const plan = JAARPLAN[selectedJaar] || [];
  const leerdoelen = LEERDOELEN[selectedJaar] || {};
  const themas = [...new Set(plan.filter(e=>!e.vac&&e.thema!=='EVALUATIE').map(e=>e.thema))];
  const themaFilters = ['', ...themas].map(t => {
    const sel = t === selectedThema;
    const color = THEMA_COLORS[t] || 'var(--accent1)';
    return `<button onclick="jpSelectThema('${t}')" style="padding:5px 14px;border-radius:16px;border:1.5px solid ${sel?color:'var(--border)'};cursor:pointer;font-size:11px;font-weight:700;font-family:'Nunito',sans-serif;background:${sel?color+'22':'var(--surface)'};color:${sel?color:'var(--text2)'};transition:all .12s">${t || 'Alle thema\'s'}</button>`;
  }).join('');
  
  // Determine which weeks to show
  const filteredPlan = plan.filter(e => !selectedThema || e.thema === selectedThema);
  
  // Week number → date string calculation
  const base = new Date(state.startDate);
  const bd = base.getDay(); base.setDate(base.getDate() + (bd===0?-6:1-bd));
  
  function weekDateStr(wn) {
    const d = new Date(base);
    d.setDate(base.getDate() + (wn-1)*7);
    const d2 = new Date(d); d2.setDate(d.getDate()+6);
    const fmt = dt => `${dt.getDate()} ${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][dt.getMonth()]}`;
    return `${fmt(d)} – ${fmt(d2)}`;
  }
  
  // Build week rows
  let prevThema = '';
  let lessonCounter = 0; // for zebra (reset at each vacation)
  let zebra = 0; // 0=white, 1=cream, stays through vacation which gets green
  
  const rows = filteredPlan.map((e, idx) => {
    const isVac = e.vac;
    const color = THEMA_COLORS[e.thema] || 'var(--accent1)';
    const themaChanged = e.thema !== prevThema;
    if(!isVac) prevThema = e.thema;
    
    // Zebra: vacation = green, non-vacation alternates white/cream  
    // After vacation, reset counter to continue from 0
    let rowBg;
    if(isVac) {
      rowBg = '#f0fdf4';
      zebra = 0; // reset after vacation
    } else {
      rowBg = zebra % 2 === 0 ? 'var(--surface)' : 'var(--cream)';
      zebra++;
    }
    
    const dateStr = weekDateStr(e.wn);
    
    // Find matching leerdoelen for this thema
    const themaLeerdoelen = leerdoelen[e.thema] || [];
    
    return `<tr style="background:${rowBg};transition:background .12s" ${!isVac?`onmouseover="this.style.background='var(--accent1)0a'" onmouseout="this.style.background='${rowBg}'"`:''}>
      <td style="padding:10px 14px;font-size:12px;font-weight:800;color:${isVac?'#16a34a':color};white-space:nowrap">
        Week ${e.wn}
      </td>
      <td style="padding:10px 10px;font-size:11px;color:var(--text3);white-space:nowrap">${dateStr}</td>
      <td style="padding:10px 10px">
        ${isVac 
          ? `<span style="background:#dcfce7;color:#16a34a;border-radius:10px;padding:3px 10px;font-size:11px;font-weight:800">🎉 ${esc(e.thema)}</span>`
          : `<span style="background:${color}22;color:${color};border-radius:10px;padding:3px 10px;font-size:11px;font-weight:800">${esc(e.thema)}</span>`
        }
      </td>
      <td style="padding:10px 10px;font-size:12px;color:var(--text);line-height:1.5;max-width:520px">
        ${isVac ? `<span style="color:#16a34a;font-style:italic">${esc(e.les)}</span>` : esc(e.les)}
      </td>
      <td style="padding:10px 10px;min-width:240px">
        ${!isVac && themaLeerdoelen.length ? `
          <div style="font-size:10px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
            <span style="background:${color}22;color:${color};border-radius:8px;padding:2px 7px;font-weight:700">${themaLeerdoelen.length} leerdoelen</span>
            <span>▾</span>
          </div>
          <div style="display:none;margin-top:5px">
            ${themaLeerdoelen.map(l=>`<div style="font-size:10px;color:var(--text2);padding:2px 0;padding-left:8px;border-left:2px solid ${color}44;margin-bottom:3px">✓ ${esc(l)}</div>`).join('')}
          </div>` : ''}
      </td>
    </tr>`;
  }).join('');
  
  // Leerdoelen accordion section at bottom
  const leerdoelenAccordion = Object.entries(leerdoelen).map(([thema, doelen]) => {
    const color = THEMA_COLORS[thema] || 'var(--accent1)';
    return `
      <div style="border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--cream);cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="background:${color}22;color:${color};border-radius:10px;padding:4px 12px;font-size:12px;font-weight:800">${esc(thema)}</span>
            <span style="font-size:11px;color:var(--text3)">${doelen.length} leerdoelen</span>
          </div>
          <span style="font-size:12px;color:var(--text3)">▾</span>
        </div>
        <div style="display:none;padding:12px 16px">
          <ol style="margin:0;padding-left:20px">
            ${doelen.map(d=>`<li style="font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border);line-height:1.5">${esc(d)}</li>`).join('')}
          </ol>
        </div>
      </div>`;
  }).join('');
  
  return `
    <div style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      📖 Jaarplannen
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="btn btn-secondary btn-sm" onclick="exportJaarplanCSV()" style="font-size:11px">📥 CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="printJaarplan()" style="font-size:11px">🖨️ PDF</button>
      </div>
    </div>
    
    <!-- Year selector -->
    <div class="card" style="padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-right:4px">Jaar</span>
      ${jaarTabs}
    </div>
    
    <!-- Thema filter -->
    <div class="card" style="padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-right:4px">Thema</span>
      ${themaFilters}
    </div>
    
    <!-- Weeks table -->
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--cream);border-bottom:2px solid var(--border)">
              <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:800;color:var(--text2)">Week</th>
              <th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:800;color:var(--text2)">Datum</th>
              <th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:800;color:var(--text2)">Thema</th>
              <th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:800;color:var(--text2)">Lesinhoud</th>
              <th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:800;color:var(--text2)">Leerdoelen</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    
    <!-- Leerdoelen accordion (all per thema) -->
    <div class="card" style="padding:16px">
      <div style="font-size:14px;font-weight:800;color:var(--text2);margin-bottom:14px">📚 Alle leerdoelen — ${selectedJaar}e jaar</div>
      ${leerdoelenAccordion || '<div style="font-size:12px;color:var(--text3)">Geen leerdoelen beschikbaar</div>'}
    </div>`;
}

// ===================== ACTIONS =====================
function selectWeek(id) { state.selectedWeek=id; render(); }

function getCurrentWeekId() {
  const today = new Date(); today.setHours(0,0,0,0);
  const base = new Date(state.startDate);
  const d = base.getDay(); base.setDate(base.getDate()+(d===0?-6:1-d));
  const found = state.weeks.find((_,i)=>{
    const ws=new Date(base); ws.setDate(base.getDate()+i*7); ws.setHours(0,0,0,0);
    const we=new Date(ws); we.setDate(ws.getDate()+6); we.setHours(23,59,59,0);
    return today>=ws && today<=we;
  });
  return found?.id || null;
}

function switchView(v) {
  state._prevView = state.view; // track where we came from
  state.view=v;
  if(v==='week') {
    const cur = getCurrentWeekId();
    if(cur) state.selectedWeek = cur;
  }
  if(v==='student-list') studentSearchQuery='';
  render();
}
function openStudentProfile(id) {
  const s = allStudents().find(x=>x.id===id);
  if(s) {
    state._prevView = state.view; // remember where we came from
    state.selectedStudent=s;
    state.view='student-profile';
    render();
  }
}
function goBack() {
  // Go back to previous view, defaulting to week
  const prev = state._prevView || 'week';
  state._prevView = null;
  switchView(prev);
}

function setEv(wId,sId,catId,val) { setEvalField(wId,sId,catId,val); renderMain(); }
function setBool(wId,sId,catId,val) { setEvalField(wId,sId,catId,val); renderMain(); }
function setAanw(wId,sId,val) { setEvalField(wId,sId,'aanwezig',val); renderMain(); }
function setNote(wId,sId,val) { setEvalField(wId,sId,'opmerking',val); }

function deleteCategory(id) {
  state.categories=state.categories.filter(c=>c.id!==id);
  saveState(); showToast("Categorie verwijderd"); render();
}
function deleteStudent(id) {
  state.groups=state.groups.map(g=>({...g,classes:g.classes.map(c=>({...c,students:c.students.filter(s=>s.id!==id)}))}));
  saveState(); showToast("Leerling verwijderd"); render();
}
function deleteGroup(id) {
  if(!confirm("Groep verwijderen? Alle klassen en leerlingen gaan verloren.")) return;
  state.groups=state.groups.filter(g=>g.id!==id);
  if(state.selectedGroup===id) state.selectedGroup=state.groups[0]?.id||null;
  saveState(); showToast("Groep verwijderd"); render();
}

function modalMoveStudent(sId) {
  const cls = allClasses();
  const opts = cls.map(c=>`<option value="${c.id}">${esc(c.name)} (${esc(c.groupName)})</option>`).join('');
  openModal(`<div class="modal-title">Leerling verplaatsen</div>
    <div class="form-group"><label class="form-label">Naar klas</label>
      <select class="form-select" id="m-cls"><option value="">Kies klas…</option>${opts}</select></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="doMoveStudent('${sId}')">Verplaatsen</button>
    </div>`);
}
function doMoveStudent(sId) {
  const targetId=document.getElementById('m-cls')?.value;
  if(!targetId) return;
  let student=null;
  const groups=state.groups.map(g=>({...g,classes:g.classes.map(c=>{
    const f=c.students.find(s=>s.id===sId);
    if(f){student=f;return{...c,students:c.students.filter(s=>s.id!==sId)};}
    return c;
  })}));
  if(!student) return;
  const final=groups.map(g=>({...g,classes:g.classes.map(c=>c.id===targetId?{...c,students:[...c.students,student]}:c)}));
  state.groups=final;
  closeModal(); saveState(); showToast("Leerling verplaatst"); render();
}

function doEditClass(classId, origGroupId) {
  const name = document.getElementById('me-cls')?.value?.trim();
  const school = document.getElementById('me-school')?.value?.trim()||'';
  const jaar = document.getElementById('me-jaar')?.value||'';
  const newGroupId = document.getElementById('me-groep')?.value || origGroupId;
  if(!name) return;
  // Find the class object
  let clsObj = null;
  state.groups = state.groups.map(g=>({...g, classes:g.classes.filter(c=>{
    if(c.id===classId){clsObj={...c,name,school,jaar};return false;}
    return true;
  })}));
  // Add to new group (or same)
  if(clsObj) {
    state.groups = state.groups.map(g=>g.id===newGroupId?{...g,classes:[...g.classes,clsObj]}:g);
  }
  closeModal(); saveState(); showToast("Klas bijgewerkt ✅"); render();
}
function deleteClass(classId) {
  state.groups = state.groups.map(g=>({...g, classes:g.classes.filter(c=>c.id!==classId)}));

}

      </div>

    <div style="overflow-y:visible">${html||'<div style="color:var(--text3);text-align:center;padding:20px">Geen klassen</div>'}</div>

function openKlasPopup(classId) {
  let found=null, foundGroup=null;
  state.groups.forEach(g=>g.classes.forEach(c=>{ if(c.id===classId){found=c;foundGroup=g;} }));
  if(!found) return;
  const sortedStudents = [...found.students].sort((a,b)=>a.name.localeCompare(b.name,'nl'));
  const currentWId = state.selectedWeek;

  openModal(`

      <div>
        <div style="font-family:'Playfair Display',serif;font-size:20px">🎓 ${esc(found.name)}</div>

        <button onclick="closeModal();openInlineGroepEdit(foundGroup.id)" style="padding:4px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);cursor:pointer;font-size:11px;font-weight:700;color:var(--text3);font-family:'Nunito',sans-serif">✏️ Bewerken</button>
        <button onclick="closeModal()" style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕</button>
      </div>
    </div>
    <div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:10px">📅 ${esc(currentWeekLabel)} — aanwezigheid & beoordeling</div>
    <div style="overflow-y:visible">${studentRows||'<div style="color:var(--text3);text-align:center;padding:20px">Geen leerlingen</div>'}</div>
  `, '600px');
}

// ===================== KLAS LESOVERZICHT =====================
function openKlasOverzicht(classId) {
  const cls = allClasses().find(c => c.id === classId);
  if (!cls) return;
  const jaar = cls.jaar;
  const plan = jaar ? JAARPLAN[jaar] : null;
  
  let rows = '';
  state.weeks.forEach((w, idx) => {
    const jpRaw = plan ? plan[idx] : null;
    const jp = jpRaw ? getJaarplanWeek(cls.jaar, idx) : null;
    const lesNote = state.evaluations?.[w.id]?.['_lesnotitie_'+classId] || '';
    const isVac = jp?.is_vacation || w.isHoliday;
    const isSkip = jp?.is_skip;
    let rowBg = '';
    if (isVac) rowBg = 'background:#fff8f0';
    else if (isSkip) rowBg = 'background:#f9f9f9';
    
    
    rows += `<tr style="${rowBg}">
      <td style="font-size:12px;font-weight:700;color:var(--accent1);white-space:nowrap;padding:8px 10px">${w.label}</td>
      <td style="font-size:11px;color:var(--text3);white-space:nowrap;padding:8px 10px">${w.dateStr||''}</td>
      <td style="font-size:12px;font-weight:600;color:${isVac?'var(--accent3)':isSkip?'var(--text3)':'var(--text)'};padding:8px 10px">${jp?esc(jp.thema):''}</td>
      <td style="font-size:12px;color:var(--text2);padding:8px 10px;max-width:420px">${jp?esc(jp.les):''}</td>
      <td style="padding:6px 8px;min-width:200px">
        <div style="display:flex;flex-direction:column;gap:4px">
          ${lesNote ? `<div style="font-size:12px;color:var(--accent1);font-weight:600">${esc(lesNote)}</div>` : ''}
          <input value="${esc(lesNote)}" placeholder="Eigen notitie toevoegen / wijzigen…"
            style="width:100%;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-family:'Nunito',sans-serif;color:var(--text);background:var(--cream);outline:none"
            onfocus="this.style.borderColor='var(--accent1)'" onblur="this.style.borderColor='var(--border)'"

        </div>
      </td>
    </tr>`;
  });

  // Override modal-box style for wide popup
  const modalBox = document.getElementById('modal-box');
  if (modalBox) {
    modalBox.style.maxWidth = '92vw';
    modalBox.style.width = '92vw';
  }

  openModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700">📚 ${esc(cls.name)}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:2px">Jaarplan overzicht ${jaar?`· <strong>${jaar}de jaar</strong>`:''}  · ${esc(cls.school||'')}</div>
      </div>
      <button onclick="closeModal()" style="margin-left:auto;background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;color:var(--text2);font-family:'Nunito',sans-serif">✕ Sluiten</button>
    </div>
    <div style="overflow-x:auto;border-radius:10px;border:1.5px solid var(--border)">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead style="position:sticky;top:0;z-index:1">
          <tr style="background:var(--cream)">
            <th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:800;color:var(--text2);white-space:nowrap;border-bottom:1.5px solid var(--border);width:80px">Week</th>
            <th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:800;color:var(--text2);white-space:nowrap;border-bottom:1.5px solid var(--border);width:120px">Datum</th>

            <th style="padding:10px 10px;text-align:left;font-size:11px;font-weight:800;color:var(--text2);border-bottom:1.5px solid var(--border);width:220px">Eigen notitie ✏️</th>

// Save les notitie per class per week
function setLesNotitie(wId, classId, val) {
  if (!state.evaluations[wId]) state.evaluations[wId] = {};
  state.evaluations[wId]['_lesnotitie_'+classId] = val;
  saveState();
}
function esc(s) {
  if(s===undefined||s===null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key in modals
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter' && document.getElementById('modal').style.display!=='none') {
    const btn = document.querySelector('#modal-box .btn-primary');
    if(btn) btn.click();
  }
});

// ===================== WEEK MANAGEMENT =====================
function addWeek() {
  const last = state.weeks[state.weeks.length - 1];
  const newNum = (last?.number || 0) + 1;
  // compute date for new week
  let dateStr = "";
  if (state.startDate) {
    const base = new Date(state.startDate);
    const day = base.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    base.setDate(base.getDate() + diff);
    const ws = new Date(base); ws.setDate(base.getDate() + (newNum-1)*7);
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    dateStr = formatDateRange(ws, we);
  }
  const newWeek = { id: uid(), number: newNum, label: `Week ${newNum}`, dateStr, isHoliday: false, holidayName: "" };
  state.weeks = [...state.weeks, newWeek];
  saveState(); showToast("Week toegevoegd"); render();
}

function deleteWeek(id) {
  if(state.weeks.length <= 1) return;
  if(!confirm("Deze week verwijderen? Evaluaties van deze week blijven bewaard maar zijn niet meer zichtbaar.")) return;
  state.weeks = state.weeks.filter(w => w.id !== id);
  if(state.selectedWeek === id) state.selectedWeek = state.weeks[0]?.id || null;
  saveState(); showToast("Week verwijderd"); render();
}

function editWeekLabel(id, val) {
  state.weeks = state.weeks.map(w => w.id === id ? {...w, label: val} : w);
  saveState(); renderSidebar();
}

function toggleWeekHoliday(id, checked) {
  state.weeks = state.weeks.map(w => w.id === id ? {...w, isHoliday: checked, holidayName: checked ? (w.holidayName||'') : ''} : w);
  saveState(); render();
}

function editWeekHolidayName(id, val) {
  state.weeks = state.weeks.map(w => w.id === id ? {...w, holidayName: val} : w);
  saveState();
}

// ===================== BACKUP / RESTORE =====================
function setSchoolYear(val) {
  state.schoolYear = val.trim();
  const badge = document.getElementById('year-badge');
  if (badge) badge.textContent = state.schoolYear + ' ▾';
  saveState();
}

function modalYearSwitcher() {
  const years = state.availableYears || [state.schoolYear];
  const yearList = years.map(y => `

      ${y!==state.schoolYear?`<button onclick="doDeleteYear('${y}')" style="background:none;border:none;cursor:pointer;font-size:14px;color:#f87171;padding:0 4px" title="Sil">🗑</button>`:''}

      <input class="form-input" id="m-newyear" placeholder="bijv. 2026-2027" autofocus>
    </div>

      <input type="checkbox" id="m-copystudents" style="accent-color:var(--accent1);width:15px;height:15px">

    </div>

      <input type="checkbox" id="m-copyuurrooster" style="accent-color:var(--accent1);width:15px;height:15px">
      <label for="m-copyuurrooster" style="font-size:12px;color:var(--text2);cursor:pointer">Uurrooster meenemen naar nieuw jaar</label>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="doAddYear()">Aanmaken</button>

  setTimeout(()=>document.getElementById('m-newyear')?.focus(),80);

function doDeleteYear(yearKey) {
  if (!confirm(`"${yearKey}" schooljaar verwijderen? Alle gegevens van dit jaar worden gewist!`)) return;
  if (!window._currentUser) { showToast("⚠️ Eerst inloggen!"); return; }
  if (!window._deleteYear) { showToast("⚠️ Functie niet beschikbaar"); return; }
  closeModal();
  window._deleteYear(yearKey);
}

function doSwitchYear(yearKey) {
  closeModal();
  if (yearKey === state.schoolYear) return;
  if (window._switchYear) {
    window._switchYear(yearKey);
  } else {
    showToast("⚠️ Eerst inloggen om van jaar te wisselen!");
  }
}

function doAddYear() {
  const yearKey = document.getElementById('m-newyear')?.value?.trim();
  const copy = document.getElementById('m-copystudents')?.checked;
  if (!yearKey || !/^\d{4}-\d{4}$/.test(yearKey)) { showToast("Format: 2026-2027"); return; }
  closeModal();
  if (window._addYear) {
    window._addYear(yearKey, copy);
  } else {
    showToast("⚠️ Eerst inloggen!");
  }
}

function setStartDate(val) {
  state.startDate = val;
  recalcWeekDates();
  saveState(); showToast("Datums herberekend!"); render();
}

function exportUurroosterCSV() {
  const ur = window._uurrooster;
  const DAGS = ['ma','di','wo','do','vr'];
  const DAG_NL = {ma:'Maandag',di:'Dinsdag',wo:'Woensdag',do:'Donderdag',vr:'Vrijdag'};
  let rows = [['Dag','Uur','Tijd','Type','Lokaal','Groepen','Klassen','Label']];
  ur.tijden.forEach(t=>{
    DAGS.forEach(dag=>{
      const slot = ur.slots[`${dag}-${t.uur}`] || {type:'vrij'};
      const groepNames = (slot.groepIds||[]).map(id=>{
        const g=state.groups.find(x=>x.id===id||x.name===id); return g?g.name:id;
      });
      rows.push([DAG_NL[dag], t.uur, `${t.start}-${t.end}`, slot.type||'vrij', slot.lokal||'', groepNames.join('; '), (slot.klasIds||[]).join('; '), slot.label||'']);
    });
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`uurrooster_${state.schoolYear}.csv`; a.click();
  showToast('📥 Uurrooster CSV gedownload!');
}

  const content = document.querySelector('.main')?.innerHTML || '';
  const win = window.open('','_blank');
  win.document.write(`<html><head><title>Uurrooster ${esc(state.schoolYear)}</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    button,.btn,.nav-tabs{display:none!important}
    @media print{@page{size:landscape}}</style></head>
    <body>${content}</body></html>`);
  setTimeout(()=>{win.print();}, 800);
}

function exportJaarplanCSV() {
  const selectedJaar = state._jpSelectedJaar || '1';
  const plan = JAARPLAN[selectedJaar] || [];
  const base = new Date(state.startDate);
  const bd = base.getDay(); base.setDate(base.getDate()+(bd===0?-6:1-bd));
  let rows = [['Week','Datum','Thema','Lesinhoud']];
  plan.forEach((e,idx)=>{
    const ws = new Date(base); ws.setDate(base.getDate()+idx*7);
    const we = new Date(ws); we.setDate(ws.getDate()+4);
    const fmt = d=>`${d.getDate()}/${d.getMonth()+1}`;
    const dateStr = `${fmt(ws)}-${fmt(we)}`;
    rows.push([`W${idx+1}`, dateStr, e.vac?'Vakantie':(e.thema||''), e.vac?(e.naam||'Vakantie'):(e.les||'')]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`jaarplan_jaar${selectedJaar}_${state.schoolYear}.csv`; a.click();
  showToast('📥 Jaarplan CSV gedownload!');
}

function printJaarplan() {
  const content = document.querySelector('.main')?.innerHTML || '';

    <body>${content}</body></html>`);
  setTimeout(()=>{win.print();}, 800);
}

function exportData() {
  const toSave = {
    schoolYear: state.schoolYear,
    selectedWeek: state.selectedWeek,
    selectedGroup: state.selectedGroup,
    groups: state.groups,
    evaluations: state.evaluations,
    categories: state.categories,
    exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(toSave, null, 2)], {type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `lesnotitie_backup_${state.schoolYear.replace('/','_')}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast("Backup gedownload!");
}

function importData(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if(!parsed.groups || !parsed.categories) throw new Error("Ongeldig bestand");
      state.groups = parsed.groups || [];
      state.evaluations = parsed.evaluations || {};
      state.categories = parsed.categories || [];
      state.schoolYear = parsed.schoolYear || state.schoolYear;
      state.selectedWeek = parsed.selectedWeek || "w1";
      state.selectedGroup = parsed.selectedGroup || null;
      document.getElementById('year-badge').textContent = state.schoolYear;
      saveState();
      showToast("Backup geladen!");
      render();
    } catch(err) {
      alert("Fout bij importeren: " + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function resetAll() {
  if(!confirm("Weet je zeker dat je ALLE gegevens wilt wissen? Dit kan niet ongedaan worden gemaakt.")) return;
  localStorage.removeItem(STORAGE_KEY);
  state.groups = [];
  state.evaluations = {};
  state.categories = DEFAULT_STATE.categories.map(c=>({...c}));
  state.weeks = generateWeeks();
  state.selectedGroup = null;
  state.selectedWeek = state.weeks[0].id;
  showToast("Alle gegevens gewist");
  render();
}

// Init
if (state.weeks && state.weeks.length > 0) {
  if (!state.weeks.find(w => w.id === state.selectedWeek)) {
    state.selectedWeek = state.weeks[0].id;
  }
  const curWeek = getCurrentWeekId();
  if (curWeek) state.selectedWeek = curWeek;
}
loadTheme();

// Warn if not Chrome (Firebase login needs Chrome)
if (window.location.protocol === 'file:' && navigator.userAgent.indexOf('Chrome') === -1) {
  setTimeout(() => showToast("⚠️ Google girişi için Chrome'da aç!"), 1000);
}

render();
